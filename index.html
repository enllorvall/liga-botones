function imprimirActa(p, eq) {
  const nE = id => { const e=eq.find(x=>x.id===id); return e?e.nombre:"?"; };
  const nL=nE(p.local_id), nV=nE(p.visitante_id);
  const fila=(min,a,b,col)=>`<tr><td style="padding:4px 8px;font-weight:700;color:${col}">${pad(min)}'</td><td style="padding:4px 8px;font-weight:600">${a}</td><td style="padding:4px 8px;color:#555;font-size:12px">${b}</td></tr>`;
  const celda=(n,tot)=>{const a=n<=tot,hh=n===8||n===12||n===16;return`<span style="display:inline-flex;width:17px;height:17px;border:1px solid ${a?(hh?"#c00":"#555"):"#ccc"};border-radius:3px;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin:1px;background:${a&&hh?"#fee":"white"};color:${a?(hh?"#c00":"#333"):"transparent"}">${a?(hh?"!":"x"):""}</span>`;};
  const mx=Math.max(p.fueras_local||0,p.fueras_visitante||0,8);
  let bL="",bV=""; for(let i=1;i<=mx;i++){bL+=celda(i,p.fueras_local||0);bV+=celda(i,p.fueras_visitante||0);}
  const SEC=t=>`<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;border-bottom:1px solid #ddd;padding-bottom:3px;margin:12px 0 7px;font-weight:600">${t}</div>`;
  let html=`<div style="display:flex;justify-content:space-between;border-bottom:3px solid #111;padding-bottom:10px;margin-bottom:14px"><div><div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;letter-spacing:2px">⚽ LIGA DE BOTONES</div><div style="font-size:12px;color:#555;margin-top:3px">Jornada ${p.jornada} · ${p.fecha}</div></div><div style="font-size:11px;color:#999">Acta oficial</div></div>`;
  html+=`<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #222"><div><div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700">${nL}</div><div style="font-size:11px;color:#666;margin-top:2px">LOCAL</div>${p.portero_local?`<div style="font-size:12px;color:#444;margin-top:4px">🧤 ${p.portero_local}</div>`:""}</div><div style="font-family:Oswald,sans-serif;font-size:50px;font-weight:700;letter-spacing:10px;padding:8px 0;text-align:center">${p.goles_local}–${p.goles_visitante}</div><div><div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700">${nV}</div><div style="font-size:11px;color:#666;margin-top:2px">VISITANTE</div>${p.portero_visitante?`<div style="font-size:12px;color:#444;margin-top:4px">🧤 ${p.portero_visitante}</div>`:""}</div></div>`;
  const gs=(p.goles||[]).slice().sort((a,b)=>+a.minuto-+b.minuto);
  const fs=(p.faltas||[]).slice().sort((a,b)=>+a.minuto-+b.minuto);
  const xs=(p.expulsiones||[]).slice().sort((a,b)=>+a.minuto-+b.minuto);
  const cs=(p.cambios||[]).slice().sort((a,b)=>+a.minuto-+b.minuto);
  if(gs.length){html+=SEC("⚽ GOLES")+`<table style="width:100%;border-collapse:collapse">${gs.map(g=>fila(g.minuto,g.autor,(g.equipo==="local"?nL:nV)+(g.tipo!=="normal"?` · ${g.tipo}`:""),"#006600")).join("")}</table>`;}
  if(fs.length){html+=SEC("🟨 FALTAS")+`<table style="width:100%;border-collapse:collapse">${fs.map(f=>fila(f.minuto,f.jugador,(f.equipo==="local"?nL:nV)+` · `+(f.tarjeta==="roja"?"Roja":"Amarilla"),"#cc8800")).join("")}</table>`;}
  if(xs.length){html+=SEC("🚨 EXPULSIONES")+`<table style="width:100%;border-collapse:collapse">${xs.map(x=>fila(x.minuto,x.jugador,(x.equipo==="local"?nL:nV)+` · `+x.motivo,"#cc0000")).join("")}</table>`;}
  if(cs.length){html+=SEC("🔄 CAMBIOS")+`<table style="width:100%;border-collapse:collapse">${cs.map(c=>fila(c.minuto,`↓ ${c.sale} / ↑ ${c.entra}`,c.equipo==="local"?nL:nV,"#555")).join("")}</table>`;}
  html+=SEC("🏳️ FUERAS DE BANDA")+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px"><div><div style="font-weight:600;margin-bottom:5px">${nL}: ${p.fueras_local||0}${(p.fueras_local||0)>=8?` (${Math.floor((p.fueras_local||0)/8)} exp.)`:""}</div>${bL}</div><div><div style="font-weight:600;margin-bottom:5px">${nV}: ${p.fueras_visitante||0}${(p.fueras_visitante||0)>=8?` (${Math.floor((p.fueras_visitante||0)/8)} exp.)`:""}</div>${bV}</div></div>`;
  if((p.paradas_local||0)+(p.paradas_visitante||0)>0){html+=SEC("🧤 PARADAS")+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px"><div>${nL}: <strong>${p.paradas_local||0}</strong></div><div>${nV}: <strong>${p.paradas_visitante||0}</strong></div></div>`;}
  if(p.notas){html+=SEC("📝 NOTAS")+`<p style="padding:7px;border:1px solid #ddd;border-radius:5px;line-height:1.5">${p.notas}</p>`;}
  html+=`<div style="margin-top:36px;display:flex;justify-content:space-between"><div style="border-top:1px solid #333;width:175px;padding-top:5px;text-align:center;font-size:11px;color:#666">Firma árbitro</div><div style="border-top:1px solid #333;width:175px;padding-top:5px;text-align:center;font-size:11px;color:#666">Firma ${nL}</div><div style="border-top:1px solid #333;width:175px;padding-top:5px;text-align:center;font-size:11px;color:#666">Firma ${nV}</div></div>`;
  document.getElementById("pdf").innerHTML=html;
  window.print();
  setTimeout(()=>{document.getElementById("pdf").innerHTML="";},3000);
}

// ── CRONÓMETRO ────────────────────────────────────────
function useCrono() {
  const [seg,setSeg]=useState(0);const [run,setRun]=useState(false);const [parte,setParte]=useState(1);
  const [fin,setFin]=useState(false);const [extra,setExtra]=useState(0);const [alerta,setAlerta]=useState(false);
  const ref=useRef(null);const al=useRef(false);const DUR=900;
  useEffect(()=>{
    if(run&&!fin){ref.current=setInterval(()=>{setSeg(s=>{const n=s+1;if(n>=(DUR+extra*60)&&!al.current){al.current=true;setAlerta(true);}return n;});},1000);}
    return ()=>clearInterval(ref.current);
  },[run,fin,extra]);
  const min=Math.floor(seg/60),sec=seg%60,minP=parte===1?min:15+min;
  const iniciar=()=>{setRun(true);setAlerta(false);al.current=false;};
  const pausar=()=>setRun(false);
  const sig2=()=>{setRun(false);setParte(2);setSeg(0);setExtra(0);setAlerta(false);al.current=false;};
  const finalizar=()=>{setRun(false);setFin(true);};
  const reset=()=>{setRun(false);setSeg(0);setParte(1);setFin(false);setExtra(0);setAlerta(false);al.current=false;};
  return{seg,run,parte,fin,extra,setExtra,alerta,iniciar,pausar,sig2,finalizar,reset,min,sec,minP};
}

function calcTabla(eq,ps) {
  const t={};eq.forEach(e=>{t[e.id]={id:e.id,nombre:e.nombre,PJ:0,PG:0,PE:0,PP:0,GF:0,GC:0,PTS:0};});

  return Object.values(t).sort((a,b)=>b.PTS-a.PTS||(b.GF-b.GC)-(a.GF-a.GC)||b.GF-a.GF);
}

  const add=async()=>{const n=nombre.trim();if(!n)return;if(eq.find(e=>e.nombre.toLowerCase()===n.toLowerCase())){alert("Ya existe.");return;}setG(true);await onAdd({id:uid(),nombre:n});setNombre("");setG(false);};
  return h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
    h(H2,null,"👕 Equipos"),
    h(Card,null,h(ST,null,"Añadir equipo"),h("div",{style:{display:"flex",gap:10,alignItems:"flex-end"}},h(Inp,{label:"Nombre",value:nombre,onChange:setNombre,placeholder:"Ej: Valencia CF",style:{flex:1}}),h("button",{onClick:add,disabled:g,style:css(G.green)},g?"…":"+ Añadir"))),
    !eq.length&&h(Card,null,h("p",{style:{color:G.muted,textAlign:"center",padding:24}},"Sin equipos.")),
    eq.map((e,i)=>h(Card,{key:e.id,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},h("span",{style:{fontFamily:"'Oswald',sans-serif",fontSize:17,color:G.muted,minWidth:22}},i+1),h("span",{style:{fontWeight:600,fontSize:15}},e.nombre)),
      h("button",{onClick:()=>{if(window.confirm("¿Eliminar?"))onDel(e.id);},style:{background:"transparent",border:"none",color:G.red,cursor:"pointer",fontSize:18}},"🗑")
    ))
  );
}

// ── APP ───────────────────────────────────────────────
function App() {
  const [eq,setEq]=useState([]);const [ps,setPs]=useState([]);
  const [tab,setTab]=useState("liga");const [loading,setLoading]=useState(true);
  const [err,setErr]=useState(null);const [verP,setVerP]=useState(null);
  const crono=useCrono();
  const wip=loadW();const hayWip=!!(wip&&(wip.jornada||wip.localId||(wip.goles&&wip.goles.length)));

  const cargar=async()=>{
    setLoading(true);
    try{
      const [re,rp]=await Promise.all([db.from("jugadores").select("*").order("created_at"),db.from("partidos").select("*").order("jornada",{ascending:false})]);
      if(re.error)throw re.error;if(rp.error)throw rp.error;
      setEq(re.data||[]);setPs(rp.data||[]);setErr(null);
    }catch(e){setErr("No se pudo conectar con Supabase.");}
    setLoading(false);
  };

  useEffect(()=>{if(CONFIGURED)cargar();else setLoading(false);},[]);
  useEffect(()=>{
    if(!CONFIGURED)return;
    const ch=db.channel("lb").on("postgres_changes",{event:"*",schema:"public",table:"jugadores"},cargar).on("postgres_changes",{event:"*",schema:"public",table:"partidos"},cargar).subscribe();
    return ()=>db.removeChannel(ch);
  },[]);

  const addEq=async e=>{const{error}=await db.from("jugadores").insert(e);if(error)alert("Error: "+error.message);else await cargar();};
  const delEq=async id=>{await db.from("jugadores").delete().eq("id",id);await cargar();};
  const addPartido=async p=>{const{error}=await db.from("partidos").insert(p);if(error){alert("Error: "+error.message);return;}clearW();await cargar();setTab("partidos");alert("✅ Acta guardada en la nube");};
  const delPartido=async id=>{await db.from("partidos").delete().eq("id",id);await cargar();};
  const actualizarPartido=async p=>{const{id,...datos}=p;const{error}=await db.from("partidos").update(datos).eq("id",id);if(error){alert("Error: "+error.message);throw new Error(error.message);}await cargar();setVerP({...p});alert("✅ Acta actualizada");};

  if(!CONFIGURED) return h(PantallaConfig,null);

  return h("div",{style:{maxWidth:700,margin:"0 auto",padding:"14px 12px 50px"}},
    h("div",{style:{textAlign:"center",marginBottom:14}},
      h("h1",{style:{fontFamily:"'Oswald',sans-serif",fontSize:27,fontWeight:700,letterSpacing:2,color:G.green}},"⚽ LIGA DE BOTONES"),
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:5}},
        h("div",{style:{width:7,height:7,borderRadius:"50%",background:err?G.red:G.green,boxShadow:`0 0 6px ${err?G.red:G.green}`}}),
        h("span",{style:{color:G.muted,fontSize:12}},err?"Sin conexión":"Conectado · tiempo real"),
        err&&h("button",{onClick:cargar,style:{background:"transparent",border:"none",color:G.blue,cursor:"pointer",fontSize:12}},"↻ Reintentar")
      )
    ),
    err&&h(Card,{style:{marginBottom:12,borderColor:G.red+"44",background:G.red+"11"}},h("p",{style:{color:G.red,fontSize:13}},err)),
    h(Nav,{tab,set:setTab,wip:hayWip}),
    h("div",{style:{marginTop:14}},
      loading?h(Spinner,null):h(Fragment,null,
        tab==="liga"     &&h(Liga,{eq,ps}),
        tab==="marcador" &&h(Marcador,{eq,ps,crono}),
        tab==="partidos" &&h(ListaPartidos,{eq,ps,onVer:setVerP}),
        tab==="acta"     &&h(NuevaActa,{eq,onGuardar:addPartido,crono}),
        tab==="stats"    &&h(Estadisticas,{eq,ps}),
        tab==="equipos"  &&h(Equipos,{eq,onAdd:addEq,onDel:delEq})
      )
    ),
    verP&&h(ModalActa,{pOrig:verP,eq,onClose:()=>setVerP(null),onEliminar:async id=>{await delPartido(id);setVerP(null);},onGuardar:actualizarPartido})
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App,null));
</script>
</body>
</html>
