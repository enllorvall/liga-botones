<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Liga de Botones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --felt-deep: #0c1f14;
  --felt:      #143324;
  --felt-hi:   #1c4530;
  --felt-line: rgba(245,240,230,0.78);
  --chalk:     #f5f0e6;
  --chalk-dim: #cfc7b6;
  --mute:      rgba(245,240,230,0.55);
  --mute-dim:  rgba(245,240,230,0.32);
  --ink:       #0a0a0a;
  --carmin:    #d6334b;
  --amber:     #ffb020;
  --win:       #7dd181;
  --loss:      #d6334b;
  --draw:      #cfc7b6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--felt-deep);
  color:var(--chalk);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
    radial-gradient(rgba(0,0,0,.06) 1px,transparent 1px);
  background-size:3px 3px,4px 4px;
  background-position:0 0,1px 2px;
  mix-blend-mode:overlay;
  pointer-events:none;
  z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.012) 0 1px,transparent 1px 7px);
  pointer-events:none;
  z-index:0;
}
#app{position:relative;z-index:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--felt-deep)}
::-webkit-scrollbar-thumb{background:var(--felt-hi)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
select option{background:var(--felt)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card{background:var(--felt);border:1px solid rgba(245,240,230,0.1);border-radius:2px;padding:18px}
.card-sm{background:var(--felt);border:1px solid rgba(245,240,230,0.1);border-radius:2px;padding:12px 14px}
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:10px 18px;border:none;border-radius:0;cursor:pointer;background:var(--carmin);color:var(--chalk);white-space:nowrap;display:inline-block;min-height:36px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-green{background:var(--win);color:var(--ink)}
.btn-gold{background:var(--amber);color:var(--ink)}
.btn-blue{background:#4a90d9;color:var(--chalk)}
.btn-red{background:var(--carmin);color:var(--chalk)}
.btn-yellow{background:var(--amber);color:var(--ink)}
.btn-purple{background:#9b7fc2;color:var(--chalk)}
.btn-ghost{background:rgba(0,0,0,0.3);color:var(--chalk);border:1px solid rgba(245,240,230,0.22)}
.btn-orange{background:#e07820;color:var(--chalk)}
.inp{background:var(--felt-hi);border:1px solid rgba(245,240,230,0.15);border-radius:2px;padding:9px 12px;color:var(--chalk);font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%;min-width:0}
.inp:focus{border-color:rgba(245,240,230,0.5)}
input[type="date"]{-webkit-appearance:none;appearance:none;display:block;width:100%!important;min-width:0!important}
input[type="date"]::-webkit-date-and-time-value{width:100%;text-align:left}
input[type="date"]::-webkit-datetime-edit{display:flex;flex:1 1 auto;min-width:0}
.sel{background:var(--felt-hi);border:1px solid rgba(245,240,230,0.15);border-radius:2px;padding:9px 12px;color:var(--chalk);font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%}
.label{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:0.16em;display:block;margin-bottom:5px}
.section-title{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:0.16em;margin-bottom:12px}
.badge{border-radius:0;padding:2px 7px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.08em;white-space:nowrap;display:inline-block;text-transform:uppercase}
.h1{font-family:'Anton',sans-serif;font-size:52px;font-weight:400;color:var(--chalk);letter-spacing:-0.005em;text-transform:uppercase;line-height:0.9}
.h2{font-family:'Anton',sans-serif;font-size:28px;font-weight:400;color:var(--chalk);text-transform:uppercase;letter-spacing:-0.005em}
.h3{font-family:'Anton',sans-serif;font-size:18px;font-weight:400;color:var(--chalk);text-transform:uppercase;letter-spacing:-0.005em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid2>*{min-width:0}
.flex-col{display:flex;flex-direction:column;gap:14px}
.nav{display:flex;gap:0;background:var(--felt);border:1px solid rgba(245,240,230,0.1);border-radius:0;padding:0;flex-wrap:wrap;margin-bottom:14px}
.nav-btn{flex:1;min-width:50px;background:transparent;color:var(--mute);border:none;border-right:1px solid rgba(245,240,230,0.08);border-radius:0;padding:10px 6px;font-family:'Inter',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;position:relative}
.nav-btn.active{background:var(--carmin);color:var(--chalk)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;overflow-y:auto;padding:12px}
.modal-box{background:var(--felt);border:1px solid rgba(245,240,230,0.15);border-radius:2px;width:100%;max-width:640px;padding:22px;margin:8px auto}
.spinner{display:flex;align-items:center;justify-content:center;padding:40px;gap:12px}
.spinner-circle{width:22px;height:22px;border:2px solid rgba(245,240,230,0.15);border-top:2px solid var(--amber);border-radius:50%;animation:spin 1s linear infinite}
.tabla-banda{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.banda-row{display:flex;gap:4px;align-items:center}
.banda-cell{width:24px;height:24px;border-radius:0;font-family:'Inter',sans-serif;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.evento-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:0;background:var(--felt-hi);border-left:2px solid rgba(245,240,230,0.08);margin-bottom:4px}
.form-add{background:rgba(28,69,48,0.6);border:1px solid rgba(245,240,230,0.1);border-radius:2px;padding:12px;margin-top:8px}
.counter{display:flex;align-items:center;gap:8px}
.counter-btn{background:var(--felt-hi);border:1px solid rgba(245,240,230,0.15);border-radius:0;width:36px;height:36px;color:var(--chalk);font-size:20px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
.counter-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;min-width:30px;text-align:center;font-variant-numeric:tabular-nums;color:var(--chalk)}
.crono-display{font-family:'Inter',sans-serif;font-size:72px;font-weight:700;line-height:1;letter-spacing:0.04em;font-variant-numeric:tabular-nums}
.partido-pendiente{cursor:pointer;transition:border-color .12s;border:1px solid rgba(245,240,230,0.1)}
.partido-pendiente:hover{border-color:rgba(245,240,230,0.35)}
.partido-jugado{cursor:pointer;transition:border-color .12s}
.partido-jugado:hover{border-color:rgba(255,176,32,0.4)}
.wip-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--amber)}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.breadcrumb-sep{color:rgba(245,240,230,0.3);font-size:12px}
.breadcrumb-link{color:var(--chalk-dim);cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.breadcrumb-link:hover{color:var(--chalk);text-decoration:underline}
.breadcrumb-current{color:var(--mute);font-family:'Inter',sans-serif;font-size:12px;letter-spacing:0.04em;text-transform:uppercase}
.tabla-clas{width:100%;border-collapse:collapse;min-width:360px;font-variant-numeric:tabular-nums}
.tabla-clas thead tr{background:var(--felt-hi);border-bottom:1px solid rgba(245,240,230,0.22)}
.tabla-clas thead th{padding:9px 8px;font-family:'Inter',sans-serif;font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:0.14em;font-weight:700}
.tabla-clas tbody tr{border-top:1px solid rgba(245,240,230,0.06)}
.tabla-clas tbody td{padding:9px 8px;font-family:'Inter',sans-serif;font-size:12px;color:var(--chalk-dim)}
.tabla-clas tbody td.eq-name{font-family:'Anton',sans-serif;font-size:16px;color:var(--chalk);font-weight:400}
.marcador-score-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;text-align:center}
.marcador-score-num{font-family:'Inter',sans-serif;font-weight:700;font-size:120px;line-height:0.9;color:var(--amber);text-shadow:0 0 18px rgba(255,176,32,0.67),0 0 6px rgba(255,176,32,0.9);letter-spacing:0.02em;font-variant-numeric:tabular-nums}
.marcador-eq-name{font-family:'Anton',sans-serif;font-size:28px;color:var(--chalk);text-transform:uppercase;letter-spacing:-0.005em}
.clavados-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:480px){
  .tabla-clas th{padding:6px 4px!important;font-size:10px!important;letter-spacing:0!important}
  .tabla-clas td{padding:6px 4px!important;font-size:12px!important}
  .tabla-clas{min-width:unset!important}
  .grid2{grid-template-columns:1fr!important}
  .clavados-grid{grid-template-columns:1fr!important}
  .marcador-score-grid{gap:8px!important}
  .marcador-score-num{font-size:44px!important;letter-spacing:4px!important}
  .marcador-eq-name{font-size:15px!important}
  .banda-cell{width:18px!important;height:18px!important;font-size:9px!important}
  .banda-row{gap:2px!important}
  .card{padding:12px!important}
  input,select,textarea{max-width:100%!important;min-width:0!important}
}
@media (min-width:760px){
  #app{max-width:900px!important}
}
@media print{
  body{background:white!important;color:black!important}
  body::before,body::after{display:none!important}
  #app{display:none!important}
  .modal-overlay{display:none!important}
  #pdf-area{display:block!important;position:relative;z-index:9999}
}
@media screen{#pdf-area{display:none}}
#pdf-area{font-family:'Inter',sans-serif;max-width:680px;margin:0 auto;padding:22px;color:#111;font-size:13px}
</style>
</head>
<body>
<div id="app" style="max-width:900px;margin:0 auto;padding:14px 12px 60px;overflow-x:hidden"></div>
<div id="pdf-area"></div>
<script>
// ── EQUIPO VISUAL KIT ─────────────────────────────────────────────
var TEAM_KIT = {
  '_masthead':          {primary:'#f5f0e6', secondary:'#d6334b', pattern:'halves',   short:'LB'},
  'milan ac':           {primary:'#c1272d', secondary:'#1a1a1a', pattern:'vstripes', short:'MIL'},
  'ac milan':           {primary:'#c1272d', secondary:'#1a1a1a', pattern:'vstripes', short:'MIL'},
  'milan':              {primary:'#c1272d', secondary:'#1a1a1a', pattern:'vstripes', short:'MIL'},
  'cd logroñés':        {primary:'#d6334b', secondary:'#f5f0e6', pattern:'vstripes', short:'LOG'},
  'logroñés':           {primary:'#d6334b', secondary:'#f5f0e6', pattern:'vstripes', short:'LOG'},
  'villarreal cf':      {primary:'#ffd200', secondary:'#1a4a8c', pattern:'solid',    short:'VIL'},
  'villarreal':         {primary:'#ffd200', secondary:'#1a4a8c', pattern:'solid',    short:'VIL'},
  'valencia cf':        {primary:'#f5f0e6', secondary:'#1a1a1a', pattern:'halves',   short:'VCF'},
  'valencia':           {primary:'#f5f0e6', secondary:'#1a1a1a', pattern:'halves',   short:'VCF'},
  'mallorca':           {primary:'#d42b2b', secondary:'#1a1a1a', pattern:'solid',    short:'MAL'},
  'rcd mallorca':       {primary:'#d42b2b', secondary:'#1a1a1a', pattern:'solid',    short:'MAL'},
  'atlético de madrid': {primary:'#c1272d', secondary:'#f5f0e6', pattern:'halves',   short:'ATM'},
  'atlético madrid':    {primary:'#c1272d', secondary:'#f5f0e6', pattern:'halves',   short:'ATM'},
  'atletico de madrid': {primary:'#c1272d', secondary:'#f5f0e6', pattern:'halves',   short:'ATM'},
  'levante ud':         {primary:'#d6334b', secondary:'#1a4a8c', pattern:'vstripes', short:'LEV'},
  'levante':            {primary:'#d6334b', secondary:'#1a4a8c', pattern:'vstripes', short:'LEV'},
  'racing de santander':{primary:'#00873e', secondary:'#f5f0e6', pattern:'vstripes', short:'RAC'},
  'racing':             {primary:'#00873e', secondary:'#f5f0e6', pattern:'vstripes', short:'RAC'},
  'real madrid':        {primary:'#f5f0e6', secondary:'#c0a84e', pattern:'solid',    short:'RMA'},
  'fc barcelona':       {primary:'#a50044', secondary:'#004d98', pattern:'vstripes', short:'FCB'},
  'barcelona':          {primary:'#a50044', secondary:'#004d98', pattern:'vstripes', short:'FCB'},
  'real sociedad':      {primary:'#1a4a8c', secondary:'#f5f0e6', pattern:'vstripes', short:'RSO'},
  'sporting gijón':     {primary:'#c1272d', secondary:'#f5f0e6', pattern:'vstripes', short:'SPO'},
  'sporting gijon':     {primary:'#c1272d', secondary:'#f5f0e6', pattern:'vstripes', short:'SPO'},
  'inter de milán':     {primary:'#1a4a8c', secondary:'#1a1a1a', pattern:'vstripes', short:'INT'},
  'inter de milan':     {primary:'#1a4a8c', secondary:'#1a1a1a', pattern:'vstripes', short:'INT'},
  'inter':              {primary:'#1a4a8c', secondary:'#1a1a1a', pattern:'vstripes', short:'INT'},
  'as roma':            {primary:'#7a1c1c', secondary:'#ffc857', pattern:'sash',     short:'ROM'},
  'roma':               {primary:'#7a1c1c', secondary:'#ffc857', pattern:'sash',     short:'ROM'},
  'cd castellón':       {primary:'#f5f0e6', secondary:'#1a1a1a', pattern:'halves',   short:'CAS'},
  'castellón':          {primary:'#f5f0e6', secondary:'#1a1a1a', pattern:'halves',   short:'CAS'},
};
// Búsqueda: DB → estático TEAM_KIT → fallback genérico
function kitEq(nombre) {
  if(!nombre) return {primary:'#4a6b4a', secondary:'#2a3a2a', pattern:'solid', short:'?'};
  // 1. Buscar en DB.equipos (kit guardado por el usuario)
  var eq = DB.equipos.find(function(e){ return e.nombre.toLowerCase().trim()===nombre.toLowerCase().trim(); });
  if(eq && eq.color_primario) {
    return {primary:eq.color_primario, secondary:eq.color_secundario||'#1a1a1a', pattern:eq.patron||'solid', short:nombre.slice(0,3).toUpperCase()};
  }
  // 2. Mapa estático
  var low = nombre.toLowerCase().trim();
  if(TEAM_KIT[low]) return TEAM_KIT[low];
  var keys = Object.keys(TEAM_KIT);
  for(var i=0;i<keys.length;i++){
    if(low.indexOf(keys[i])!==-1 || keys[i].indexOf(low)!==-1) return TEAM_KIT[keys[i]];
  }
  // 3. Fallback genérico
  return {primary:'#4a6b4a', secondary:'#2a3a2a', pattern:'solid', short:nombre.slice(0,3).toUpperCase()};
}
// Versión que acepta kit directo (para preview en vivo del editor)
function buttonSVGFromKit(kit, size) {
  size = size || 40;
  var k = kit;
  var s = size, cx = s/2, cy = s/2, r = s*0.46;
  var ringW = Math.max(1, s*0.035);
  var holeR = Math.max(1.4, s*0.045);
  var hd = s*0.13;
  var id = 'bk' + (++_btnCtr);
  var face = '';
  if (k.pattern === 'halves') {
    face = '<rect x="0" y="0" width="'+s+'" height="'+cy+'" fill="'+k.primary+'"/><rect x="0" y="'+cy+'" width="'+s+'" height="'+cy+'" fill="'+k.secondary+'"/>';
  } else if (k.pattern === 'vstripes') {
    var N=6, w=s/N; for(var i=0;i<N;i++) face+='<rect x="'+(i*w)+'" y="0" width="'+w+'" height="'+s+'" fill="'+(i%2?k.secondary:k.primary)+'"/>';
  } else if (k.pattern === 'hoops') {
    var H=5, h=s/H; for(var i=0;i<H;i++) face+='<rect x="0" y="'+(i*h)+'" width="'+s+'" height="'+h+'" fill="'+(i%2?k.secondary:k.primary)+'"/>';
  } else if (k.pattern === 'sash') {
    face = '<rect x="0" y="0" width="'+s+'" height="'+s+'" fill="'+k.primary+'"/><polygon points="0,'+s*0.32+' '+s*0.32+',0 '+s+','+s*0.68+' '+s*0.68+','+s+'" fill="'+k.secondary+'"/>';
  } else if (k.pattern === 'quarters') {
    face = '<rect x="0" y="0" width="'+cx+'" height="'+cy+'" fill="'+k.primary+'"/><rect x="'+cx+'" y="0" width="'+cx+'" height="'+cy+'" fill="'+k.secondary+'"/><rect x="0" y="'+cy+'" width="'+cx+'" height="'+cy+'" fill="'+k.secondary+'"/><rect x="'+cx+'" y="'+cy+'" width="'+cx+'" height="'+cy+'" fill="'+k.primary+'"/>';
  } else {
    face = '<rect x="0" y="0" width="'+s+'" height="'+s+'" fill="'+k.primary+'"/>';
  }
  var holes = [[-1,-1],[1,-1],[-1,1],[1,1]].map(function(d){
    return '<circle cx="'+(cx+d[0]*hd)+'" cy="'+(cy+d[1]*hd)+'" r="'+holeR+'" fill="#0a0a0a" opacity="0.85"/>';
  }).join('');
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'" style="display:block;flex-shrink:0">'+
    '<defs>'+
      '<clipPath id="c-'+id+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'"/></clipPath>'+
      '<radialGradient id="g-'+id+'" cx="35%" cy="30%" r="70%">'+
        '<stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>'+
        '<stop offset="55%" stop-color="#fff" stop-opacity="0"/>'+
        '<stop offset="100%" stop-color="#000" stop-opacity="0.18"/>'+
      '</radialGradient>'+
    '</defs>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+k.secondary+'"/>'+
    '<g clip-path="url(#c-'+id+')" transform="translate('+cx+','+cy+') scale('+((r-ringW)/r)+') translate('+(- cx)+','+(- cy)+')">'+face+'</g>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#g-'+id+')"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.78)+'" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="'+Math.max(0.5,s*0.008)+'" stroke-dasharray="'+(s*0.04)+' '+(s*0.025)+'"/>'+
    holes+
    '</svg>';
}
// ── SELECTOR DE JUGADOR (compatible móvil) ────────────────────────
// <datalist> no funciona en iOS Safari; usamos select nativo + input fallback
function onPlayerPick(selId, inpId) {
  var sel = document.getElementById(selId);
  var inp = document.getElementById(inpId);
  if(!sel || !inp) return;
  if(sel.value === '__OTRO__') {
    inp.style.display = 'block';
    inp.value = '';
    inp.focus();
  } else {
    inp.style.display = 'none';
    inp.value = sel.value;
  }
}
function playerPickHTML(idText, localId, visitanteId) {
  var jjs = DB.plantilla.filter(function(j){ return j.equipo_id===localId||j.equipo_id===visitanteId; });
  if(!jjs.length) return '<input type="text" id="'+idText+'" placeholder="Nombre" class="inp"/>';
  var nL = localId ? nEq(localId) : '', nV = visitanteId ? nEq(visitanteId) : '';
  var loc = jjs.filter(function(j){return j.equipo_id===localId;}).sort(function(a,b){return (a.dorsal||99)-(b.dorsal||99);});
  var vis = jjs.filter(function(j){return j.equipo_id===visitanteId;}).sort(function(a,b){return (a.dorsal||99)-(b.dorsal||99);});
  var opts = '<option value="">— Seleccionar —</option>';
  if(loc.length) opts += '<optgroup label="'+nL+'">'+loc.map(function(j){ return '<option value="'+j.nombre.replace(/"/g,'&quot;')+'">'+(j.dorsal?j.dorsal+'. ':'')+j.nombre+'</option>'; }).join('')+'</optgroup>';
  if(vis.length) opts += '<optgroup label="'+nV+'">'+vis.map(function(j){ return '<option value="'+j.nombre.replace(/"/g,'&quot;')+'">'+(j.dorsal?j.dorsal+'. ':'')+j.nombre+'</option>'; }).join('')+'</optgroup>';
  opts += '<option value="__OTRO__">✏ Escribir nombre...</option>';
  return '<select id="'+idText+'-pick" class="sel" onchange="onPlayerPick(\''+idText+'-pick\',\''+idText+'\')">'+opts+'</select>'+
    '<input type="text" id="'+idText+'" placeholder="Nombre" class="inp" style="display:none;margin-top:4px"/>';
}

var _btnCtr = 0;
function buttonSVG(nombre, size) {
  size = size || 40;
  var k = kitEq(nombre);
  var s = size, cx = s/2, cy = s/2, r = s*0.46;
  var ringW = Math.max(1, s*0.035);

    for(var i=0;i<H;i++) face+='<rect x="0" y="'+(i*h)+'" width="'+s+'" height="'+h+'" fill="'+(i%2?k.secondary:k.primary)+'"/>';

  } else if (k.pattern === 'quarters') {
    face = '<rect x="0" y="0" width="'+cx+'" height="'+cy+'" fill="'+k.primary+'"/><rect x="'+cx+'" y="0" width="'+cx+'" height="'+cy+'" fill="'+k.secondary+'"/><rect x="0" y="'+cy+'" width="'+cx+'" height="'+cy+'" fill="'+k.secondary+'"/><rect x="'+cx+'" y="'+cy+'" width="'+cx+'" height="'+cy+'" fill="'+k.primary+'"/>';
  } else {
    face = '<rect x="0" y="0" width="'+s+'" height="'+s+'" fill="'+k.primary+'"/>';
  }
  var holes = [[-1,-1],[1,-1],[-1,1],[1,1]].map(function(d){
    return '<circle cx="'+(cx+d[0]*hd)+'" cy="'+(cy+d[1]*hd)+'" r="'+holeR+'" fill="#0a0a0a" opacity="0.85"/>';
  }).join('');
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'" style="display:block;flex-shrink:0">'+
    '<defs>'+
      '<clipPath id="c-'+uid+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'"/></clipPath>'+

        '<stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>'+
        '<stop offset="55%" stop-color="#fff" stop-opacity="0"/>'+
        '<stop offset="100%" stop-color="#000" stop-opacity="0.18"/>'+
      '</radialGradient>'+
    '</defs>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+k.secondary+'"/>'+
    '<g clip-path="url(#c-'+uid+')" transform="translate('+cx+','+cy+') scale('+((r-ringW)/r)+') translate('+(-cx)+','+(-cy)+')">'+face+'</g>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="url(#g-'+uid+')"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*0.78)+'" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="'+Math.max(0.5,s*0.008)+'" stroke-dasharray="'+s*0.04+' '+s*0.025+'"/>'+
    holes+
  '</svg>';
}

// ── GENERADOR DE CALENDARIOS ──────────────────────────────────────
// Algoritmo round-robin para N equipos
function generarCalendario(equipoIds, vueltas) {
  var eqs = equipoIds.slice();
  var impar = eqs.length % 2 !== 0;
  if(impar) eqs.push('BYE'); // equipo ficticio para descanso
  var n = eqs.length;
  var jornadas = [];
  var rondasPorVuelta = n - 1;
  for(var vuelta = 0; vuelta < vueltas; vuelta++) {
    for(var ronda = 0; ronda < rondasPorVuelta; ronda++) {
      var partidos = [];
      for(var i = 0; i < n/2; i++) {
        var local = eqs[i];
        var visitante = eqs[n-1-i];
        // En segunda vuelta invertir local/visitante
        if(vuelta % 2 === 1) { var tmp=local; local=visitante; visitante=tmp; }
        if(local !== 'BYE' && visitante !== 'BYE') {
          partidos.push({local:local, visitante:visitante});
        }
      }
      jornadas.push({número: vuelta*rondasPorVuelta + ronda + 1, partidos:partidos});
      // Rotar equipos (el primero fijo)
      var ultimo = eqs.splice(n-1,1)[0];
      eqs.splice(1,0,ultimo);
    }
  }
  return jornadas;
}

// Generador para eliminatorias (cuadros)
function generarEliminatorias(equipoIds) {
  var n = equipoIds.length;
  var rondas = [];
  // Primera ronda: emparejar 1vs2, 3vs4, etc.
  var partidos = [];
  for(var i=0; i<Math.floor(n/2); i++) {
    partidos.push({local:equipoIds[i*2], visitante:equipoIds[i*2+1]});
  }
  rondas.push({número:1, nombre:'Fase de grupos / 1a ronda', partidos:partidos});
  // Si hay potencia de 2, generar más rondas vacías
  var siguientes = Math.ceil(n/2);
  var numRonda = 2;
  while(siguientes > 1) {
    var ps = [];
    for(var j=0; j<Math.floor(siguientes/2); j++) {
      ps.push({local:'Por determinar', visitante:'Por determinar'});
    }
    var nombre = siguientes===2?'Final':siguientes===4?'Semifinales':siguientes===8?'Cuartos':'Ronda '+numRonda;
    rondas.push({número:numRonda, nombre:nombre, partidos:ps});
    siguientes = Math.ceil(siguientes/2);
    numRonda++;
  }
  return rondas;
}

// ── CLASIFICACION ─────────────────────────────────────────────────
function calcTabla(eqIds, partidos) {
  var t = {};
  eqIds.forEach(function(id){ t[id]={id:id,PJ:0,PG:0,PE:0,PP:0,GF:0,GC:0,PTS:0}; });
  partidos.filter(function(p){return p.completado;}).forEach(function(p){
    var l=t[p.local_id], v=t[p.visitante_id];
    if(!l||!v) return;
    l.PJ++;v.PJ++;l.GF+=p.goles_local;l.GC+=p.goles_visitante;v.GF+=p.goles_visitante;v.GC+=p.goles_local;
    if(p.goles_local>p.goles_visitante){l.PG++;l.PTS+=3;v.PP++;}
    else if(p.goles_local<p.goles_visitante){v.PG++;v.PTS+=3;l.PP++;}
    else{l.PE++;v.PE++;l.PTS++;v.PTS++;}
  });
  return Object.values(t).sort(function(a,b){return b.PTS-a.PTS||(b.GF-b.GC)-(a.GF-a.GC)||b.GF-a.GF;});
}

  if(!liga) return '<p style="color:var(--carmin)">Liga no encontrada.</p>';
  var eqSet={};DB.partidos.filter(function(p){return p.liga_id===liga.id;}).forEach(function(p){eqSet[p.local_id]=true;eqSet[p.visitante_id]=true;});var eqIds=Object.keys(eqSet);
  var psLiga = partidosDe(liga.id, null);
  var tabla = calcTabla(eqIds, psLiga);
  var jornadas = jornadasDe(liga.id, null).sort(function(a,b){return a.numero-b.numero;});

  // Tabla clasificación
  var tablaHtml = '';
  if(tabla.length) {
    var lastIdx = tabla.length - 1;
    var rows = tabla.map(function(e,i){
      var isFirst = i===0, isLast = i===lastIdx;
      var nombre = nEq(e.id);
      var ptsColor = isFirst ? 'var(--amber)' : isLast ? 'var(--loss)' : 'var(--chalk)';
      var rowBg = isFirst ? 'rgba(255,176,32,0.05)' : 'transparent';
      var borderLeft = isFirst ? 'border-left:3px solid var(--amber)' : isLast ? 'border-left:3px solid var(--loss)' : 'border-left:3px solid transparent';
      return '<tr style="border-top:1px solid rgba(245,240,230,0.06);background:'+rowBg+';'+borderLeft+'">' +
        '<td style="padding:9px 8px;text-align:center;font-family:\'Inter\',sans-serif;font-size:11px;color:var(--mute)">'+( i+1)+'</td>' +
        '<td class="eq-name" style="padding:9px 8px;display:flex;align-items:center;gap:8px">'+buttonSVG(nombre,24)+'<span>'+nombre+'</span></td>' +
        [e.PJ,e.PG,e.PE,e.PP,e.GF,e.GC,e.GF-e.GC].map(function(v){return '<td style="padding:9px 8px;text-align:center;color:var(--chalk-dim);font-size:12px">'+v+'</td>';}).join('') +
        '<td style="padding:9px 8px;text-align:center;font-family:\'Anton\',sans-serif;font-size:20px;color:'+ptsColor+'">'+e.PTS+'</td></tr>';
    }).join('');
    tablaHtml = '<div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">' +
      '<table class="tabla-clas">' +
      '<thead><tr>'+['#','Equipo','PJ','PG','PE','PP','GF','GC','DG','PTS'].map(function(h,i){return '<th style="text-align:'+(i===1?'left':'center')+'">'+h+'</th>';}).join('')+'</tr></thead>' +
      '<tbody>'+rows+'</tbody></table></div>';
  }

  // Calendario por jornadas
  var calHtml = '<h3 class="h3" style="margin-bottom:12px;margin-top:8px">Calendario</h3>';
  if(!jornadas.length) {
    calHtml += '<p style="color:var(--mute);font-size:13px">El calendario se generará al crear la liga.</p>';
  } else {
    jornadas.forEach(function(j) {
      var ps = partidosDeJornada(j.id);
      var todos = ps.length;
      var jugados = ps.filter(function(p){return p.completado;}).length;
      calHtml += '<div class="card" style="margin-bottom:8px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
        '<h3 class="h3" style="font-size:16px">Jornada '+j.numero+'</h3>' +
        '<span style="font-family:\'Inter\',sans-serif;font-size:10px;color:var(--mute)">'+jugados+'/'+todos+'</span>' +
        '</div>';
      if(!ps.length) {
        calHtml += '<p style="color:var(--mute);font-size:13px">Sin partidos.</p>';
      } else {
        ps.forEach(function(p) {
          var jugado = p.completado;
          var nL = nEq(p.local_id), nV = nEq(p.visitante_id);
          calHtml += '<div class="'+(jugado?'partido-jugado':'partido-pendiente')+' card-sm" style="margin-bottom:6px" data-pid="'+p.id+'">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">' +
            '<div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end">'+
              '<span style="font-family:\'Anton\',sans-serif;font-size:15px;text-transform:uppercase;color:var(--chalk)">'+nL+'</span>'+buttonSVG(nL,24)+'</div>' +
            (jugado
              ? '<div style="padding:4px 12px;font-family:\'Inter\',sans-serif;font-size:18px;font-weight:700;color:var(--amber);letter-spacing:3px;white-space:nowrap;font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(255,176,32,0.5)">'+p.goles_local+'–'+p.goles_visitante+'</div>'
              : '<div style="padding:4px 12px;font-family:\'Inter\',sans-serif;font-size:13px;color:var(--mute-dim);letter-spacing:2px">vs</div>') +
            '<div style="display:flex;align-items:center;gap:6px;flex:1">'+buttonSVG(nV,24)+'<span style="font-family:\'Anton\',sans-serif;font-size:15px;text-transform:uppercase;color:var(--chalk)">'+nV+'</span></div>' +
            '</div></div>';
        });
      }
      calHtml += '</div>';
    });
  }

  var btn_eliminar = árbitro ? '<button class="btn btn-red" id="btn-eliminar-liga" style="font-size:10px">Eliminar</button>' : '';

  return '<div>' +
    '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">'+liga.nombre+'</span></div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">' +
    '<div><h2 class="h2">'+liga.nombre+'</h2><p style="font-family:\'Inter\',sans-serif;font-size:10px;color:var(--mute);margin-top:4px;letter-spacing:0.08em">'+liga.temporada+' · '+eqIds.length+' equipos · '+liga.vueltas+' vuelta'+( liga.vueltas>1?'s':'')+'</p></div>' +
    '<div style="display:flex;gap:6px"><button class="btn btn-ghost" id="btn-liga-stats" style="font-size:10px">Estadísticas</button>'+btn_eliminar+'</div>' +
    '</div>' +
    '<h3 class="h3" style="margin-bottom:12px">Clasificación</h3>' +
    tablaHtml + calHtml + '</div>';
}

// ── PANTALLA TORNEO ────────────────────────────────────────────────
function buildTorneo() {
  var torneo = getTorneo(VIEW.torneoId);
  if(!torneo) return '<p style="color:var(--carmin)">Torneo no encontrado.</p>';
  var eqSet={};DB.partidos.filter(function(p){return p.torneo_id===torneo.id;}).forEach(function(p){eqSet[p.local_id]=true;eqSet[p.visitante_id]=true;});var eqIds=Object.keys(eqSet);
  var psTorneo = partidosDe(null, torneo.id);
  var jornadas = jornadasDe(null, torneo.id).sort(function(a,b){return a.numero-b.numero;});

  var contenido = '';
  if(torneo.tipo === 'todos_contra_todos') {
    var tabla = calcTabla(eqIds, psTorneo);
    if(tabla.length) {
      var rows = tabla.map(function(e,i){
        var med = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        return '<tr style="border-top:1px solid rgba(245,240,230,0.08);background:'+(i===0?'rgba(255,176,32,0.07)':'transparent')+'">' +
          '<td style="padding:8px 7px;text-align:center">'+med+'</td>' +
          '<td style="padding:8px 7px;font-weight:600">'+nEq(e.id)+'</td>' +
          [e.PJ,e.PG,e.PE,e.PP,e.GF,e.GC,e.GF-e.GC].map(function(v){return '<td style="padding:8px 7px;text-align:center;color:var(--mute);font-size:13px">'+v+'</td>';}).join('') +
          '<td style="padding:8px 7px;text-align:center;font-weight:700;color:var(--amber);font-size:16px">'+e.PTS+'</td></tr>';
      }).join('');
      contenido += '<div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">' +
        '<table class="tabla-clas" style="width:100%;border-collapse:collapse;min-width:320px">' +
        '<thead><tr style="background:var(--felt-hi)">'+['#','Equipo','PJ','PG','PE','PP','GF','GC','DG','PTS'].map(function(h,i){return '<th style="padding:9px 7px;font-size:11px;color:var(--mute);text-transform:uppercase;font-weight:600;text-align:'+(i===1?'left':'center')+'">'+h+'</th>';}).join('')+'</tr></thead>' +
        '<tbody>'+rows+'</tbody></table></div>';
    }
  }

  contenido += '<h3 class="h3" style="margin-bottom:12px">📅 Partidos</h3>';
  jornadas.forEach(function(j) {
    var ps = partidosDeJornada(j.id);
    contenido += '<div class="card" style="margin-bottom:10px">' +
      '<h3 class="h3" style="font-size:15px;margin-bottom:10px">'+(j.nombre||'Jornada '+j.numero)+'</h3>';
    ps.forEach(function(p) {
      var jugado = p.completado;
      var tL=nEq(p.local_id),tV=nEq(p.visitante_id);
      contenido += '<div class="'+(jugado?'partido-jugado':'partido-pendiente')+' card-sm" style="margin-bottom:6px" data-pid="'+p.id+'">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">' +
        '<div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end">'+
          '<span style="font-family:\'Anton\',sans-serif;font-size:15px;text-transform:uppercase;color:var(--chalk)">'+tL+'</span>'+buttonSVG(tL,24)+'</div>' +
        (jugado
          ? '<div style="padding:4px 12px;font-family:\'Inter\',sans-serif;font-size:18px;font-weight:700;color:var(--amber);letter-spacing:3px;white-space:nowrap;font-variant-numeric:tabular-nums">'+p.goles_local+'–'+p.goles_visitante+'</div>'
          : '<div style="padding:4px 12px;font-family:\'Inter\',sans-serif;font-size:13px;color:var(--mute-dim);letter-spacing:2px">vs</div>') +
        '<div style="display:flex;align-items:center;gap:6px;flex:1">'+buttonSVG(tV,24)+'<span style="font-family:\'Anton\',sans-serif;font-size:15px;text-transform:uppercase;color:var(--chalk)">'+tV+'</span></div>' +
        '</div></div>';
    });
    contenido += '</div>';
  });

  return '<div>' +
    '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">'+torneo.nombre+'</span></div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">' +
    '<div><h2 class="h2">'+torneo.nombre+'</h2><p style="color:var(--mute);font-size:13px;margin-top:3px">'+torneo.tipo+' · '+eqIds.length+' equipos</p></div>' +
    '<button class="btn btn-red" id="btn-eliminar-torneo" style="font-size:12px;padding:6px 12px">🗑 Eliminar</button>' +
    '</div>' + contenido + '</div>';
}

    return (items||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;}).map(function(it){
      var txt = it.autor||it.jugador||(it.sale?it.sale+' / '+it.entra:'')||'';
      var eqBadge = it.equipo ? '<span class="badge" style="background:rgba('+(it.equipo==='local'?'125,209,129':'255,176,32')+',0.15);color:'+(it.equipo==='local'?'var(--win)':'var(--amber)')+'">'+(it.equipo==='local'?nL:nV)+'</span>' : '';

  if(edit) edit.addEventListener('click',function(){MODAL.editando=true;render();});

  if(ira) ira.addEventListener('click',function(){
    if(!WIP.partidoId || WIP.partidoId !== p.id) {

      WIP.ligaId=p.liga_id; WIP.torneoId=p.torneo_id; WIP.jornadaId=p.jornada_id; WIP.partidoId=p.id;

  });
  var sav=$('btn-modal-save');

    var gL=$('md-gL'),gV=$('md-gV'),notas=$('md-notas'),portL=$('md-portL'),portV=$('md-portV');

    if(notas) p.notas=notas.value; if(portL) p.portero_local=portL.value; if(portV) p.portero_visitante=portV.value;
    guardarEdición(p);
  });
  function counter(dId,iId,vId,get,set){
    var d=$(dId),i=$(iId);
    if(d) d.addEventListener('click',function(){var v=Math.max(0,get()-1);set(v);var el=$(vId);if(el)el.textContent=v;});
    if(i) i.addEventListener('click',function(){var v=get()+1;set(v);var el=$(vId);if(el)el.textContent=v;});
  }
  counter('md-pL-dec','md-pL-inc','md-pL-val',function(){return p.paradas_local||0;},function(v){p.paradas_local=v;});
  counter('md-pV-dec','md-pV-inc','md-pV-val',function(){return p.paradas_visitante||0;},function(v){p.paradas_visitante=v;});
  counter('md-fL-dec','md-fL-inc','md-fL-val',function(){return p.fueras_local||0;},function(v){p.fueras_local=v;});
  counter('md-fV-dec','md-fV-inc','md-fV-val',function(){return p.fueras_visitante||0;},function(v){p.fueras_visitante=v;});
  document.querySelectorAll('.del-evento').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tipo=this.dataset.tipo,id=this.dataset.id;
      p[tipo]=(p[tipo]||[]).filter(function(x){return x.id!==id;});
      if(tipo==='goles'){p.goles_local=(p.goles||[]).filter(function(g){return g.equipo==='local';}).length;p.goles_visitante=(p.goles||[]).filter(function(g){return g.equipo==='visitante';}).length;}
      render();

  var ag=$('btn-add-gol-md');

    var min=$('add-gol-min').value,jug=$('add-gol-jug').value,eq=$('add-gol-eq').value,tipo=$('add-gol-tipo').value;
    if(!min||!jug) return;
    p.goles=(p.goles||[]).concat([{id:uid(),minuto:min,autor:jug,equipo:eq,tipo:tipo}]);
    p.goles_local=(p.goles).filter(function(g){return g.equipo==='local';}).length;
    p.goles_visitante=(p.goles).filter(function(g){return g.equipo==='visitante';}).length;
    render();
  });
  var af=$('btn-add-falt-md');
  if(af) af.addEventListener('click',function(){
    var min=$('add-falt-min').value,jug=$('add-falt-jug').value,eq=$('add-falt-eq').value;
    if(!min||!jug) return;
    var t=(p.faltas||[]).filter(function(f){return f.jugador===jug&&f.equipo===eq;}).length===0?'amarilla':'roja';
    p.faltas=(p.faltas||[]).concat([{id:uid(),minuto:min,jugador:jug,equipo:eq,tarjeta:t}]);
    render();
  });
  var ax=$('btn-add-exp-md');
  if(ax) ax.addEventListener('click',function(){
    var min=$('add-exp-min').value,jug=$('add-exp-jug').value,eq=$('add-exp-eq').value,mot=$('add-exp-mot').value;
    if(!jug) return;
    p.expulsiones=(p.expulsiones||[]).concat([{id:uid(),minuto:min,jugador:jug,equipo:eq,motivo:mot}]);
    render();
  });
  var ac=$('btn-add-cam-md');
  if(ac) ac.addEventListener('click',function(){
    var min=$('add-cam-min').value,eq=$('add-cam-eq').value,sale=$('add-cam-sale').value,entra=$('add-cam-entra').value;
    if(!min||!sale||!entra) return;
    p.cambios=(p.cambios||[]).concat([{id:uid(),minuto:min,equipo:eq,sale:sale,entra:entra}]);
    render();
  });
  var acor=$('btn-add-cor-md');
  if(acor) acor.addEventListener('click',function(){
    var eq=$('add-cor-eq-md').value,gol=$('add-cor-gol-md').value;
    p.corners=(p.corners||[]).concat([{id:uid(),equipo:eq,gol:gol}]);
    render();
  });
}

function attachModalNuevaLigaEvents(){
  var btn=$('btn-crear-liga');
  if(btn) btn.addEventListener('click',async function(){
    var nombre=($('nl-nombre').value||'').trim();
    var temporada=($('nl-temporada').value||'').trim();
    var vueltas=+($('nl-vueltas').value||2);
    var eqIds=[];
    document.querySelectorAll('.eq-check:checked').forEach(function(cb){eqIds.push(cb.value);});
    if(!nombre){alert('Escribe un nombre para la liga.');return;}
    if(eqIds.length<2){alert('Seleccióna al menos 2 equipos.');return;}
    btn.disabled=true; btn.textContent='Creando...';
    var ligaId=uid();
    // Crear liga
    var r1=await db.from('ligas').insert({id:ligaId,nombre:nombre,temporada:temporada,vueltas:vueltas,estado:'activa'});
    if(r1.error){alert('Error: '+r1.error.message);btn.disabled=false;btn.textContent='Crear liga';return;}
    // Asignar equipos a la liga (actualizar jugadores con liga_id)
    for(var i=0;i<eqIds.length;i++){
      await db.from('jugadores').update({liga_id:ligaId}).eq('id',eqIds[i]);
    }
    // Generar calendario
    var calendario=generarCalendario(eqIds,vueltas);
    for(var ji=0;ji<calendario.length;ji++){
      var jorData=calendario[ji];
      var jorId=uid();
      await db.from('jornadas').insert({id:jorId,liga_id:ligaId,numero:jorData.numero});
      for(var pi=0;pi<jorData.partidos.length;pi++){
        var part=jorData.partidos[pi];
        await db.from('partidos').insert({
          id:uid(), liga_id:ligaId, jornada_id:jorId,
          local_id:part.local, visitante_id:part.visitante,
          goles_local:0, goles_visitante:0,
          goles:[], faltas:[], expulsiones:[], cambios:[],
          completado:false
        });
      }
    }
    await cargar();
    MODAL={type:null,data:null,editando:false};
    VIEW={screen:'liga',ligaId:ligaId,torneoId:null};
    render();
  });
}

function _detectarEqJugador(nombre, localId, visitanteId) {
  if (!nombre) return null;
  var low = nombre.toLowerCase();
  var j = DB.plantilla.find(function(p) {
    return (p.equipo_id === localId || p.equipo_id === visitanteId) && p.nombre.toLowerCase() === low;
  });
  if (!j) return null;
  return j.equipo_id === localId ? 'local' : 'visitante';
}

  document.body.appendChild(wrap.firstChild);
}

    '</div>' +

  );

  function obtenerJugador() {
    var p = document.getElementById('mfalt-jug-pick');
    var i = document.getElementById('mfalt-jug');
    if (p && p.value && p.value !== '__OTRO__') return p.value;
    return i ? i.value : '';
  }

  document.getElementById('mfalt-x').addEventListener('click', cerrar);

  document.getElementById('mfalt-ok').addEventListener('click', function() {

    var t = (WIP.faltas||[]).filter(function(f){return f.jugador===jug&&f.equipo===eq;}).length===0?'amarilla':'roja';
    WIP.faltas = (WIP.faltas||[]).concat([{id:uid(),minuto:min,jugador:jug,equipo:eq,tarjeta:t}]);
    if (t==='roja') alert('🟥 Doble faut de '+jug+' — registra la expulsión');
    saveWip(WIP); sincronizarEnCurso(); cerrar(); render();

// ── ACTA EVENTS ───────────────────────────────────────────────────
function attachActaEvents(){
  var ci1=$('cron-inicio-1'),cf1=$('cron-fin-1'),ci2=$('cron-inicio-2'),cf2=$('cron-fin-2');
  var pa=$('cron-pausar'),rea=$('cron-reanudar'),re=$('cron-reset');
  if(ci1) ci1.addEventListener('click',cronInicioPrimera);
  if(cf1) cf1.addEventListener('click',cronFinalPrimera);
  if(ci2) ci2.addEventListener('click',cronInicioSegunda);
  if(cf2) cf2.addEventListener('click',cronFinalPartido);
  if(pa)  pa.addEventListener('click',cronPausar);
  if(rea) rea.addEventListener('click',cronReanudar);
  if(re)  re.addEventListener('click',function(){ if(window.confirm('¿Reiniciar el cronómetro?')) cronReset(); });
  var durEl=$('cron-duracion'); if(durEl){durEl.value=CRON.duracion;durEl.addEventListener('change',function(){CRON.duracion=Math.max(1,Math.min(45,+this.value||15));saveCron();});}

  function bindInp(id,key){ var el=$(id); if(el){ el.value=WIP[key]||''; var fn=function(){WIP[key]=this.value;saveWip(WIP);}; el.addEventListener('input',fn); el.addEventListener('change',fn); el.addEventListener('blur',fn); } }
  function bindSel(id,key){ var el=$(id); if(el){el.addEventListener('change',function(){WIP[key]=this.value;saveWip(WIP);render();});} }
  bindInp('w-jornada','jornada'); bindInp('w-fecha','fecha');
  bindInp('w-árbitro','arbitro'); bindInp('w-notas','notas'); bindInp('w-árbitro','arbitro');
  bindInp('w-porteroL','porteroL'); bindInp('w-porteroV','porteroV');
  // Solo mostrar selects de equipo si no vienen prefijados del calendario
  if(!WIP.localId) bindSel('w-local','localId');
  if(!WIP.visitanteId) bindSel('w-visitante','visitanteId');

  function bindCounter(decId,incId,valId,key){
    var d=$(decId),i=$(incId);
    if(d) d.addEventListener('click',function(){
      WIP[key]=Math.max(0,(WIP[key]||0)-1);saveWip(WIP);
      if(key==='fuerasL'||key==='fuerasV'){salvarWipActual();sincronizarEnCurso();render();}else{var el=$(valId);if(el)el.textContent=WIP[key];}
    });
    if(i) i.addEventListener('click',function(){
      WIP[key]=(WIP[key]||0)+1;saveWip(WIP);
      if(key==='fuerasL'||key==='fuerasV'){if(esProxima(WIP[key]))playBuzzer();salvarWipActual();sincronizarEnCurso();render();}else{var el=$(valId);if(el)el.textContent=WIP[key];}
    });
  }
  bindCounter('pL-dec','pL-inc','pL-val','paradasL');
  bindCounter('pV-dec','pV-inc','pV-val','paradasV');
  bindCounter('tL-dec','tL-inc','tL-val','tirosL');
  bindCounter('tV-dec','tV-inc','tV-val','tirosV');
  bindCounter('fL-dec','fL-inc','fL-val','fuerasL');
  bindCounter('fV-dec','fV-inc','fV-val','fuerasV');

  var ag=$('btn-add-gol-wip');
  if(ag) ag.addEventListener('click', abrirModalGol);
  var af=$('btn-add-falt-wip');
  if(af) af.addEventListener('click', abrirModalFauts);
  var ax=$('btn-add-exp-wip');
  if(ax) ax.addEventListener('click',function(){
    var jug=$('w-exp-jug').value,eq=$('w-exp-eq').value,mot=$('w-exp-mot').value;
    if(!jug) return;
    WIP.expulsiones=(WIP.expulsiones||[]).concat([{id:uid(),jugador:jug,equipo:eq,motivo:mot}]);
    saveWip(WIP); sincronizarEnCurso(); render();
  });
  var ac=$('btn-add-cam-wip');
  if(ac) ac.addEventListener('click',function(){
    var min=$('w-cam-min').value,eq=$('w-cam-eq').value,sale=$('w-cam-sale').value,entra=$('w-cam-entra').value;
    if(!min||!sale||!entra) return;
    WIP.cambios=(WIP.cambios||[]).concat([{id:uid(),minuto:min,equipo:eq,sale:sale,entra:entra}]);
    saveWip(WIP); sincronizarEnCurso(); render();
  });
  var acor=$('btn-add-cor-wip');
  if(acor) acor.addEventListener('click',function(){
    var eq=$('w-cor-eq').value,gol=$('w-cor-gol').value;
    WIP.corners=(WIP.corners||[]).concat([{id:uid(),equipo:eq,gol:gol}]);
    saveWip(WIP); sincronizarEnCurso(); render();
  });
  document.querySelectorAll('.del-wip').forEach(function(btn){
    btn.addEventListener('click',function(){
      var tipo=this.dataset.tipo,id=this.dataset.id;
      WIP[tipo]=(WIP[tipo]||[]).filter(function(x){return x.id!==id;});
      saveWip(WIP); render();
    });
  });
  var gm=$('acta-goto-marcador');
  if(gm) gm.addEventListener('click',function(){salvarWipActual();VIEW.screen='marcador';render();});
  var gs=$('acta-goto-stats');
  if(gs) gs.addEventListener('click',function(){
    salvarWipActual();
    VIEW.statsFilter = WIP.ligaId ? {type:'liga',id:WIP.ligaId} : WIP.torneoId ? {type:'torneo',id:WIP.torneoId} : {type:'amistosos'};
    VIEW.screen='stats'; render();
  });
  var lim=$('btn-limpiar');
  if(lim) lim.addEventListener('click',function(){
    if(!window.confirm('¿Borrar borrador?')) return;
    WIP=newWip(); clearWip(); cronReset();
    if(VIEW.ligaId) VIEW.screen='liga';
    else if(VIEW.torneoId) VIEW.screen='torneo';
    else VIEW.screen='home';
    render();
  });
  var gb=$('btn-guardar-acta');
  if(gb) gb.addEventListener('click',async function(){
    if(!WIP.localId||!WIP.visitanteId){alert('Seleccióna dos equipos.');return;}
    gb.disabled=true; gb.textContent='Guardando...';
    var partido={
      id: WIP.partidoId||uid(),
      jornada: Number(WIP.jornada)||null,
      fecha: WIP.fecha, arbitro: WIP.arbitro||'',
      local_id:WIP.localId, visitante_id:WIP.visitanteId,
      arbitro:WIP.arbitro||'', portero_local:WIP.porteroL, portero_visitante:WIP.porteroV,
      paradas_local:WIP.paradasL, paradas_visitante:WIP.paradasV,
      tiros_local:WIP.tirosL||0, tiros_visitante:WIP.tirosV||0,
      fueras_local:WIP.fuerasL, fueras_visitante:WIP.fuerasV,
      goles:(WIP.goles||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;}),
      faltas:(WIP.faltas||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;}),
      expulsiones:(WIP.expulsiones||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;}),
      cambios:(WIP.cambios||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;}),
      corners:WIP.corners||[],
      goles_local:(WIP.goles||[]).filter(function(g){return g.equipo==='local';}).length,
      goles_visitante:(WIP.goles||[]).filter(function(g){return g.equipo==='visitante';}).length,
      notas:WIP.notas, completado:true,
      liga_id:WIP.ligaId||null, torneo_id:WIP.torneoId||null,
      jornada_id:WIP.jornadaId||null
    };
    var res;
    if(WIP.partidoId) {
      // Actualizar partido existente del calendario
      var {id,...datos}=partido;
      res = await db.from('partidos').update(datos).eq('id',WIP.partidoId);
    } else {
      res = await db.from('partidos').insert(partido);
    }
    if(res.error){alert('Error: '+res.error.message);gb.disabled=false;gb.textContent='Guardar acta';return;}
    WIP=newWip(); clearWip(); cronReset();
    await cargar();
    // Volver a donde corresponde
    if(VIEW.ligaId) VIEW.screen='liga';
    else if(VIEW.torneoId) VIEW.screen='torneo';
    else VIEW.screen='home';
    render();
    alert('Acta guardada correctamente');
  });
}

// ── CRONOMETRO ────────────────────────────────────────────────────
function cronTick(){
  var seg=Math.floor(calcSegDisplay());
  var d=$('crono-display'),st=$('crono-status');
  if(d) d.textContent=pad(Math.floor(seg/60))+':'+pad(seg%60);
  if(st){
    if(CRON.estado==='2run'){
      var elapsed2=CRON.tsInicio?(Date.now()-CRON.tsInicio)/1000:0;
      var min2=Math.floor((CRON.segAcum+elapsed2)/60);
      st.textContent='2ª parte'+(min2>0?' · Minuto '+min2:'');
    } else if(CRON.estado==='1run'){
      var elapsed1=CRON.tsInicio?(Date.now()-CRON.tsInicio)/1000:0;
      st.textContent='1ª parte · Minuto '+Math.floor((CRON.segAcum+elapsed1)/60);
    }
  }
}
function cronInicioPrimera(){
  CRON.estado='1run'; CRON.segAcum=0; CRON.tsInicio=Date.now();
  clearInterval(cronInterval); cronInterval=setInterval(cronTick,500);
  saveCron(); sincronizarCron(); salvarWipActual(); render();
  playSound('snd-inicio');
}
function cronFinalPrimera(){
  acumular(); CRON.estado='fin1';
  clearInterval(cronInterval);
  saveCron(); sincronizarCron(); salvarWipActual(); render();
  playSound('snd-final');
}
function cronInicioSegunda(){
  CRON.estado='2run'; CRON.segAcum=0; CRON.tsInicio=Date.now();
  clearInterval(cronInterval); cronInterval=setInterval(cronTick,500);
  saveCron(); sincronizarCron(); salvarWipActual(); render();
}
function cronFinalPartido(){
  acumular(); CRON.estado='fin';
  clearInterval(cronInterval);
  saveCron(); sincronizarCron(); salvarWipActual(); render();
  playSound('snd-final');
}
function cronPausar(){
  acumular();
  CRON.estado=CRON.estado==='1run'?'1pause':'2pause';
  clearInterval(cronInterval);
  saveCron(); sincronizarCron(); salvarWipActual(); render();
}
function cronReanudar(){
  CRON.estado=CRON.estado==='1pause'?'1run':'2run';
  CRON.tsInicio=Date.now();
  clearInterval(cronInterval); cronInterval=setInterval(cronTick,500);
  saveCron(); sincronizarCron(); salvarWipActual(); render();
}
function cronReset(){
  clearInterval(cronInterval);
  var dur=CRON.duracion||15;
  CRON={duracion:dur,estado:'idle',segAcum:0,tsInicio:null};
  clearCronLS(); sincronizarCron(); render();
}
function sincronizarCron(){
  if(!WIP.partidoId||!db) return;
  var segSnap=CRON.segAcum+(cronIsRunning()&&CRON.tsInicio?(Date.now()-CRON.tsInicio)/1000:0);
  db.from('partidos').update({cron_estado:{
    estado:CRON.estado, duracion:CRON.duracion,
    segAcum:segSnap, tsSync:Date.now(),
    run:cronIsRunning(), parte:CRON.estado[0]==='2'||CRON.estado==='fin'?2:1,
    fin:CRON.estado==='fin'
  }}).eq('id',WIP.partidoId).then(function(){}).catch(function(){});
}

// ── SUPABASE ──────────────────────────────────────────────────────
async function cargar(){
  try{
    // Cargar todo en paralelo
    var [re, rl, rt, rj, rp, rpl] = await Promise.all([
      db.from('jugadores').select('*').order('created_at'),
      db.from('ligas').select('*').order('created_at'),
      db.from('torneos').select('*').order('created_at'),
      db.from('jornadas').select('*').order('numero'),
      db.from('partidos').select('*').order('created_at'),
      db.from('plantilla').select('*').order('nombre')
    ]);
    if(re.error) throw re.error;
    DB.equipos=re.data||[];
    DB.ligas=rl.data||[];
    DB.torneos=rt.data||[];
    DB.jornadas=rj.data||[];
    DB.partidos=rp.data||[];
    DB.plantilla=rpl.data||[];
    // Añadir nombre de jornada a cada partido para el modal
    DB.partidos.forEach(function(p){
      if(p.jornada_id){
        var j=DB.jornadas.find(function(x){return x.id===p.jornada_id;});
        if(j) p.jornada_nombre=(j.nombre||'Jornada '+j.numero);
      }
    });
  } catch(e){ console.error('Error cargando datos:',e); }
}

function guardarEdición(p){
  var id=p.id; var datos=clone(p); delete datos.id; delete datos.jornada_nombre;
  db.from('partidos').update(datos).eq('id',id).then(function(res){
    if(res.error){alert('Error: '+res.error.message);return;}
    cargar().then(function(){
      MODAL.editando=false;
      var updated=DB.partidos.find(function(x){return x.id===id;});
      if(updated) MODAL.data=clone(updated);
      render();
    });
  });
}

async function eliminarLiga(id){
  await db.from('ligas').delete().eq('id',id);
  // Liberar equipos
  await db.from('jugadores').update({liga_id:null}).eq('liga_id',id);
  await cargar();
  VIEW={screen:'home',ligaId:null,torneoId:null};
  render();
}

async function eliminarTorneo(id){
  await db.from('torneos').delete().eq('id',id);
  await db.from('jugadores').update({torneo_id:null}).eq('torneo_id',id);
  await cargar();
  VIEW={screen:'home',ligaId:null,torneoId:null};
  render();
}

// ── PDF ───────────────────────────────────────────────────────────
function imprimirActa(p){
  var nL=nEq(p.local_id), nV=nEq(p.visitante_id);
  function pad2(n){return String(n).padStart(2,"0");}
  function filaMin(min,a,b,col){return '<tr><td style="padding:4px 8px;font-weight:700;color:'+col+';white-space:nowrap">'+pad2(min)+"'</td><td style='padding:4px 8px;font-weight:600'>"+a+"</td><td style='padding:4px 8px;color:#555;font-size:12px'>"+b+"</td></tr>";}
  function filaSinMin(a,b,col){return '<tr><td style="padding:4px 8px;font-weight:700;color:'+col+'">—</td><td style="padding:4px 8px;font-weight:600">'+a+'</td><td style="padding:4px 8px;color:#555;font-size:12px">'+b+'</td></tr>';}
  function celda(n,tot){var a=n<=tot,hh=n===8||n===12||n===16||n===20;return '<span style="display:inline-flex;width:17px;height:17px;border:1px solid '+(a?(hh?"#c00":"#555"):"#ccc")+';border-radius:3px;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin:1px;background:'+(a&&hh?"#fee":"white")+';color:'+(a?(hh?"#c00":"#333"):"transparent")+'">'+(a?(hh?"!":"x"):"")+'</span>';}
  var mx=Math.max(p.fueras_local||0,p.fueras_visitante||0,8);
  var bL="",bV="";for(var i=1;i<=mx;i++){bL+=celda(i,p.fueras_local||0);bV+=celda(i,p.fueras_visitante||0);}
  var gs=(p.goles||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});
  var fs=(p.faltas||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});
  var xs=(p.expulsiones||[]).slice();
  var cs=(p.cambios||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});
  var cors=(p.corners||[]).slice();
  var SEC=function(t){return '<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;border-bottom:1px solid #ddd;padding-bottom:3px;margin:12px 0 7px;font-weight:600">'+t+'</div>';};

  // Cabecera
  var html='<div style="display:flex;justify-content:space-between;border-bottom:3px solid #111;padding-bottom:10px;margin-bottom:14px">' +
    '<div><div style="font-family:Anton,sans-serif;font-size:20px;font-weight:700;letter-spacing:2px">LIGA DE BOTONES</div>' +
    '<div style="font-size:12px;color:#555;margin-top:3px">'+(p.jornada_nombre||('Jornada '+p.jornada))+' — '+p.fecha+(p.arbitro?' — Árbitro: '+p.arbitro:'')+'</div></div>' +
    '<div style="font-size:11px;color:#999">Acta oficial</div></div>';

  // Marcador y porteros con paradas
  var portL=p.portero_local?('<div style="font-size:12px;color:#444;margin-top:4px">🧤 '+p.portero_local+(p.paradas_local?'<span style="margin-left:6px;font-size:11px;color:#888">('+p.paradas_local+' paradas)</span>':'')+'</div>'):'';
  var portV=p.portero_visitante?('<div style="font-size:12px;color:#444;margin-top:4px">🧤 '+p.portero_visitante+(p.paradas_visitante?'<span style="margin-left:6px;font-size:11px;color:#888">('+p.paradas_visitante+' paradas)</span>':'')+'</div>'):'';
  html+='<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #222">' +
    '<div><div style="font-family:Anton,sans-serif;font-size:20px;font-weight:700">'+nL+'</div><div style="font-size:11px;color:#666;margin-top:2px">LOCAL</div>'+portL+'</div>' +
    '<div style="font-family:Anton,sans-serif;font-size:50px;font-weight:700;letter-spacing:10px;padding:8px 0;text-align:center">'+(p.goles_local||0)+' - '+(p.goles_visitante||0)+'</div>' +
    '<div><div style="font-family:Anton,sans-serif;font-size:20px;font-weight:700">'+nV+'</div><div style="font-size:11px;color:#666;margin-top:2px">VISITANTE</div>'+portV+'</div></div>';

  if(gs.length){html+=SEC("GOLES")+'<table style="width:100%;border-collapse:collapse">'+gs.map(function(g){return filaMin(g.minuto,g.autor,(g.equipo==="local"?nL:nV)+(g.tipo!=="normal"?" — "+g.tipo:""),"#006600");}).join('')+'</table>';}
  if(fs.length){html+=SEC("FALTAS")+'<table style="width:100%;border-collapse:collapse">'+fs.map(function(f){return filaMin(f.minuto,f.jugador,(f.equipo==="local"?nL:nV)+" — "+(f.tarjeta==="roja"?"Roja":"Amarilla"),"#cc8800");}).join('')+'</table>';}
  if(xs.length){html+=SEC("EXPULSIONES")+'<table style="width:100%;border-collapse:collapse">'+xs.map(function(x){return filaSinMin(x.jugador,(x.equipo==="local"?nL:nV)+" — "+x.motivo,"#cc0000");}).join('')+'</table>';}
  if(cs.length){html+=SEC("CAMBIOS")+'<table style="width:100%;border-collapse:collapse">'+cs.map(function(c){return filaMin(c.minuto,c.sale+' → '+c.entra,c.equipo==="local"?nL:nV,"#555");}).join('')+'</table>';}
  if(cors.length){html+=SEC("CÓRNERS")+'<table style="width:100%;border-collapse:collapse">'+cors.map(function(c){return filaSinMin("🚩 "+(c.equipo==="local"?nL:nV),c.gol==="si"?"⚽ Acabó en gol":"Sin gol","#0055aa");}).join('')+'</table>';}

function buildMarcador() {

  var nL=nEq(ultimo.local_id),nV=nEq(ultimo.visitante_id),liga=ultimo.liga_id?getLiga(ultimo.liga_id):null;

  return html;

function _marcadorUltimo(){
  var wip=loadWip(),wipOk=!!(wip&&wip.localId&&wip.visitanteId),ultimo;
  if(wipOk){
    ultimo={local_id:wip.localId,visitante_id:wip.visitanteId,
      goles_local:(wip.goles||[]).filter(function(g){return g.equipo==='local';}).length,
      goles_visitante:(wip.goles||[]).filter(function(g){return g.equipo==='visitante';}).length,
      goles:wip.goles||[],fecha:wip.fecha,jornada:wip.jornada||'?',liga_id:wip.ligaId,
      fueras_local:wip.fuerasL||0,fueras_visitante:wip.fuerasV||0};
  } else {
    var ESTADOS_EN_JUEGO=['1run','1pause','fin1','2run','2pause'];var conCron=DB.partidos.filter(function(p){return !p.completado&&p.cron_estado&&ESTADOS_EN_JUEGO.indexOf(p.cron_estado.estado)!==-1;});
    conCron.sort(function(a,b){return (b.cron_estado.tsSync||0)-(a.cron_estado.tsSync||0);});
    if(conCron.length){ultimo=conCron[0];}
    else{
      var hoy=new Date().toISOString().slice(0,10);
      var enC=DB.partidos.filter(function(p){return !p.completado&&p.local_id&&p.visitante_id&&p.jornada_id&&(p.fecha===hoy||((p.goles||[]).length+(p.faltas||[]).length)>0);});
      enC.sort(function(a,b){return new Date(b.created_at||0)-new Date(a.created_at||0);});
      if(enC.length){ultimo=enC[0];}
      else{var comp=DB.partidos.filter(function(p){return p.completado;});comp.sort(function(a,b){return new Date(b.created_at||0)-new Date(a.created_at||0);});ultimo=comp[0]||null;}
    }
  }
  return ultimo;
}

      DB.partidos.forEach(function(p){

function attachMarcadorEvents(){
  // Auto-refresco de datos cada 7 segundos (sin tocar el cron)
  clearInterval(marcadorRefreshInterval);
  marcadorRefreshInterval = setInterval(function(){
    if(VIEW.screen==='marcador'){ _recargarPartidosYActualizar(); }
    else { clearInterval(marcadorRefreshInterval); }
  }, 7000);

  // Ticker en vivo: solo actualiza #crono-display y #crono-status, no toca el resto
  clearInterval(marcadorCronTicker);
  marcadorCronTicker = setInterval(function(){
    if(VIEW.screen!=='marcador'){clearInterval(marcadorCronTicker);marcadorCronTicker=null;return;}
    var wip=loadWip(),wipOk=!!(wip&&wip.localId&&wip.visitanteId);
    var el=$('crono-display'),st=$('crono-status');
    if(!el) return;
    if(wipOk){
      // Árbitro: usar CRON local
      var segDisp=Math.floor(calcSegDisplay());
      var ceL=CRON.estado;
      var col=(ceL==='1run'||ceL==='2run')?'var(--win)':(ceL==='idle')?'var(--mute)':'var(--amber)';
      el.style.color=col;
      el.textContent=pad(Math.floor(segDisp/60))+':'+pad(segDisp%60);
      if(st){var stTxt=ceL==='idle'?'Sin iniciar':ceL==='1run'?'1ª parte':ceL==='1pause'?'Pausado · 1ª parte':ceL==='fin1'?'Descanso':ceL==='2run'?'2ª parte':ceL==='2pause'?'Pausado · 2ª parte':ceL==='fin'?'Partido finalizado':'';st.textContent=stTxt;}
    } else {
      // Espectador: usar cron_estado de DB
      var cronPs=DB.partidos.filter(function(x){return !x.completado&&x.cron_estado&&x.cron_estado.tsSync;});
      cronPs.sort(function(a,b){return (b.cron_estado.tsSync||0)-(a.cron_estado.tsSync||0);});
      var p=cronPs[0]||null;
      if(!p||!p.cron_estado) return;
      var ce=p.cron_estado;
      var segAcumR=ce.segAcum||0;
      if(ce.run&&ce.tsSync) segAcumR+=(Date.now()-ce.tsSync)/1000;
      var baseR=(ce.parte===2||ce.estado==='fin')?(ce.duracion||15)*60:0;
      var ts=Math.floor(baseR+segAcumR);
      var cronCol=ce.run?'var(--win)':ce.fin?'var(--amber)':'var(--mute)';
      el.style.color=cronCol;
      el.textContent=pad(Math.floor(ts/60))+':'+pad(ts%60);
      if(st) st.textContent=ce.fin?'Partido finalizado':ce.run?(ce.parte===2?'2ª parte':'1ª parte'):'Pausado';
    }
  },1000);
}

  if(!WIP.localId||!WIP.visitanteId) return;

  var datos={local_id:WIP.localId,visitante_id:WIP.visitanteId,
    goles_local:(WIP.goles||[]).filter(function(g){return g.equipo==='local';}).length,
    goles_visitante:(WIP.goles||[]).filter(function(g){return g.equipo==='visitante';}).length,
    goles:WIP.goles||[],faltas:WIP.faltas||[],expulsiones:WIP.expulsiones||[],cambios:WIP.cambios||[],corners:WIP.corners||[],
    fueras_local:WIP.fuerasL||0,fueras_visitante:WIP.fuerasV||0,
    tiros_local:WIP.tirosL||0,tiros_visitante:WIP.tirosV||0,

    completado:false,liga_id:WIP.ligaId||null,torneo_id:WIP.torneoId||null,jornada_id:WIP.jornadaId||null,
    cron_estado:{estado:CRON.estado,duracion:CRON.duracion,segAcum:segSnap,tsSync:Date.now(),run:cronIsRunning(),parte:CRON.estado[0]==='2'||CRON.estado==='fin'?2:1,fin:CRON.estado==='fin'}};

function buildEquipos() {

  var enTorneo = DB.equipos.filter(function(e){return !!e.torneo_id;});

  function listaEqs(eqs,subtitle){
    if(!eqs.length) return '<p style="color:var(--mute);font-size:13px;padding:6px 0">Ninguno.</p>';
    return eqs.map(function(e){
      var njug = DB.plantilla.filter(function(j){return j.equipo_id===e.id;}).length;
      return '<div class="card-sm" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer" onclick="MODAL={type:\'equipo\',data:DB.equipos.find(function(x){return x.id===\''+e.id+'\';}),editando:false};render();">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
        buttonSVG(e.nombre, 32) +
        '<div>'+
          '<div style="font-family:\'Anton\',sans-serif;font-size:18px;text-transform:uppercase;color:var(--chalk)">'+e.nombre+'</div>' +
          '<div style="font-size:11px;color:var(--mute);margin-top:2px">'+
            (subtitle?subtitle(e)+' · ':'')+
            (njug?njug+' jugadores':'Sin plantilla')+
          '</div>'+
        '</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px;align-items:center">'+
        '<span style="font-size:10px;color:var(--mute)">Gestionar ›</span>'+
        (!e.liga_id&&!e.torneo_id&&esModoÁrbitro()?'<button class="btn btn-ghost del-eq" data-eid="'+e.id+'" style="padding:4px 10px;font-size:10px;min-height:0" onclick="event.stopPropagation()">Eliminar</button>':'') +
        '</div>'+
        '</div>';
    }).join('');
  }

  var wipActivoEq = !!(WIP&&WIP.localId&&WIP.visitanteId);
  var bannerActaEq = wipActivoEq ? '<div style="background:rgba(255,176,32,0.08);border:1px solid rgba(255,176,32,0.35);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px"><span style="font-family:\'Inter\',sans-serif;font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:0.1em">&#11044; Acta en curso</span><button class="btn btn-gold" onclick="volverAlActa()" style="font-size:10px;padding:6px 14px">Volver al acta</button></div>' : '';
  return '<div class="flex-col">' +
    '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Equipos</span></div>' +
    bannerActaEq +

    '<div class="card"><p class="section-title">Añadir equipo</p>' +
    '<div style="display:flex;gap:10px;align-items:flex-end">' +
    '<div style="flex:1"><label class="label">Nombre</label><input type="text" id="eq-nombre" placeholder="Ej: Valencia CF" class="inp"/></div>' +
    (esModoÁrbitro()?'<button class="btn btn-green" id="btn-add-eq" style="font-size:10px">+ Añadir</button>':'')+'</div></div>' +
