function buildModalEquipo() {
  var e = MODAL.data;
  if(!e) return '';
  var árbitro = esModoÁrbitro();
  var kit = kitEq(e.nombre);
  var jugadores = DB.plantilla.filter(function(j){ return j.equipo_id === e.id; }).sort(function(a,b){
    if(a.dorsal&&b.dorsal) return a.dorsal-b.dorsal;
    if(a.dorsal) return -1;
    if(b.dorsal) return 1;
    return a.nombre.localeCompare(b.nombre);
  });
  var patrones = [
    {val:'solid',    label:'Sólido'},
    {val:'halves',   label:'Mitades'},
    {val:'vstripes', label:'Rayas V'},
    {val:'hoops',    label:'Aros'},
    {val:'sash',     label:'Banda diagonal'},
    {val:'quarters', label:'Cuartos'},
  ];
  var curPrimary   = e.color_primario   || kit.primary;
  var curSecondary = e.color_secundario || kit.secondary;
  var curPattern   = e.patron           || kit.pattern;

  // ── Kit editor ──
  var kitHtml =
    '<div id="kit-preview" style="display:flex;align-items:center;justify-content:center;padding:16px 0">'+
      buttonSVGFromKit({primary:curPrimary, secondary:curSecondary, pattern:curPattern}, 80)+
    '</div>';
  if(árbitro){
    kitHtml +=
      '<div class="grid2" style="margin-bottom:12px">'+
        '<div><label class="label">Color principal</label>'+
          '<input type="color" id="kit-primary" value="'+curPrimary+'" class="inp" style="height:42px;padding:4px;cursor:pointer"/></div>'+
        '<div><label class="label">Color secundario</label>'+
          '<input type="color" id="kit-secondary" value="'+curSecondary+'" class="inp" style="height:42px;padding:4px;cursor:pointer"/></div>'+
      '</div>'+
      '<div style="margin-bottom:14px"><label class="label">Patrón</label>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">'+
        patrones.map(function(pat){
          var sel = curPattern === pat.val;
          return '<label style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:8px;background:var(--felt-hi);border:1px solid '+(sel?'rgba(255,176,32,0.6)':'rgba(245,240,230,0.1)')+';border-radius:2px">'+
            '<input type="radio" name="kit-patron" value="'+pat.val+'"'+(sel?' checked':'')+' style="accent-color:var(--amber)"/>'+
            '<span style="font-size:12px;color:var(--chalk)">'+pat.label+'</span>'+
            '</label>';
        }).join('')+
        '</div></div>'+
      '<button class="btn btn-gold" id="btn-kit-save" style="width:100%;margin-bottom:4px">Guardar kit</button>';
  } else {
    kitHtml += '<p style="font-size:12px;color:var(--mute);text-align:center;margin-bottom:8px">Requiere modo árbitro para editar el kit.</p>';
  }

  // ── Plantilla ──
  var plantillaHtml = '<p class="section-title" style="margin-top:16px;margin-bottom:8px">Plantilla · '+jugadores.length+' jugadores</p>';
  if(jugadores.length){
    plantillaHtml += jugadores.map(function(j){
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(245,240,230,0.07)">'+
        '<div>'+
          (j.dorsal?'<span style="font-family:\'Inter\',sans-serif;font-size:13px;color:var(--amber);font-weight:700;min-width:22px;display:inline-block;text-align:right;margin-right:8px">'+j.dorsal+'</span>':'')+
          '<span style="font-size:14px;color:var(--chalk);font-weight:500">'+j.nombre+'</span>'+
          (j.posicion?'<span style="font-size:11px;color:var(--mute);margin-left:8px">'+j.posicion+'</span>':'')+
        '</div>'+
        (árbitro?'<button class="btn btn-ghost del-jugador" data-jid="'+j.id+'" style="font-size:12px;padding:3px 10px;min-height:0;color:var(--carmin)">×</button>':'')+
      '</div>';
    }).join('');
  } else {
    plantillaHtml += '<p style="color:var(--mute);font-size:13px;padding:4px 0 10px">Sin jugadores. El acta usará texto libre como hasta ahora.</p>';
  }
  if(árbitro){
    plantillaHtml +=
      '<div class="form-add" style="margin-top:8px">'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;margin-bottom:8px">'+
          '<div><label class="label">Nombre</label><input type="text" id="new-jug-nombre" placeholder="Ej: Carreño" class="inp"/></div>'+
          '<div><label class="label">Posición (opcional)</label><select id="new-jug-pos" class="sel">'+
            '<option value="">—</option>'+
            '<option value="Portero">Portero</option>'+
            '<option value="Defensa">Defensa</option>'+
            '<option value="Centrocampista">Centrocampista</option>'+
            '<option value="Delantero">Delantero</option>'+
          '</select></div>'+
          '<div><label class="label">Dorsal</label><input type="number" id="new-jug-dorsal" placeholder="—" min="1" max="99" class="inp" style="text-align:center"/></div>'+
        '</div>'+
        '<button class="btn btn-green" id="btn-add-jugador" style="font-size:10px">+ Añadir jugador</button>'+
      '</div>';
  }

  return '<div class="modal-overlay" id="modal-overlay"><div class="modal-box">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px">'+
      '<div style="display:flex;align-items:center;gap:12px">'+
        buttonSVG(e.nombre,40)+
        '<h2 class="h2">'+e.nombre+'</h2>'+
      '</div>'+
      '<button class="btn btn-ghost" id="btn-modal-close" style="font-size:12px;padding:5px 12px;min-height:0">✕</button>'+
    '</div>'+
    '<p class="section-title">Kit del botón</p>'+
    kitHtml+
    plantillaHtml+
  '</div></div>';
}

function buildStats() {
  var wipActivo = !!(WIP&&WIP.localId&&WIP.visitanteId);
  var bannerActa = wipActivo ? '<div style="background:rgba(255,176,32,0.12);border:1px solid rgba(255,176,32,0.35);border-radius:2px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px"><span style="color:var(--amber);font-size:13px;font-weight:600">✏️ Acta en curso</span><button class="btn btn-gold" onclick="volverAlActa()" style="font-size:12px;padding:6px 14px">Volver al acta</button></div>' : '';
  var bcBase = '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span>';

  // ── PICKER: sin contexto seleccionado ─────────────────────────────
  if(!VIEW.statsFilter){
    var ligasStats = DB.ligas.slice().sort(function(a,b){return new Date(b.created_at||0)-new Date(a.created_at||0);});
    var torneosStats = DB.torneos.slice().sort(function(a,b){return new Date(b.created_at||0)-new Date(a.created_at||0);});
    var hayAmist = DB.partidos.some(function(p){return p.completado&&!p.liga_id&&!p.torneo_id;});
    var html = bcBase+'<span class="breadcrumb-current">Estadísticas</span></div>';
    html += bannerActa;
    html += '<h2 class="h2" style="margin-bottom:4px">📊 Estadísticas</h2>';
    html += '<p style="color:var(--mute);font-size:13px;margin-bottom:16px">Selecciona una competición para ver sus estadísticas.</p>';
    html += '<div class="flex-col">';
    if(ligasStats.length){
      html += '<p class="section-title" style="margin-bottom:8px">Ligas</p>';
      ligasStats.forEach(function(l){
        var np = DB.partidos.filter(function(p){return p.completado&&p.liga_id===l.id;}).length;
        html += '<div class="card stats-picker-item" data-stats-type="liga" data-stats-id="'+l.id+'" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px">'+
          '<div><div style="font-weight:700;font-size:15px">'+l.nombre+'</div>'+
          '<div style="color:var(--mute);font-size:12px;margin-top:2px">'+l.temporada+' · '+np+' partido'+(np!==1?'s':'')+' jugado'+(np!==1?'s':'')+'</div></div>'+
          '<button class="btn btn-ghost" style="font-size:12px;flex-shrink:0">📊 Ver</button></div>';
      });
    }
    if(torneosStats.length){
      html += '<p class="section-title" style="margin-top:8px;margin-bottom:8px">Torneos</p>';
      torneosStats.forEach(function(t){
        var np = DB.partidos.filter(function(p){return p.completado&&p.torneo_id===t.id;}).length;
        html += '<div class="card stats-picker-item" data-stats-type="torneo" data-stats-id="'+t.id+'" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px">'+
          '<div><div style="font-weight:700;font-size:15px">'+t.nombre+'</div>'+
          '<div style="color:var(--mute);font-size:12px;margin-top:2px">Torneo · '+np+' partido'+(np!==1?'s':'')+' jugado'+(np!==1?'s':'')+'</div></div>'+
          '<button class="btn btn-ghost" style="font-size:12px;flex-shrink:0">📊 Ver</button></div>';
      });
    }
    if(hayAmist){
      html += '<p class="section-title" style="margin-top:8px;margin-bottom:8px">Otros</p>';
      var na = DB.partidos.filter(function(p){return p.completado&&!p.liga_id&&!p.torneo_id;}).length;
      html += '<div class="card stats-picker-item" data-stats-type="amistosos" data-stats-id="" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px">'+
        '<div><div style="font-weight:700;font-size:15px">⚽ Partidos amistosos</div>'+
        '<div style="color:var(--mute);font-size:12px;margin-top:2px">Sin competición asignada · '+na+' partido'+(na!==1?'s':'')+'</div></div>'+
        '<button class="btn btn-ghost" style="font-size:12px;flex-shrink:0">📊 Ver</button></div>';
    }
    if(!ligasStats.length&&!torneosStats.length&&!hayAmist){
      html += '<div class="card"><p style="color:var(--mute);text-align:center;padding:40px">No hay partidos completados todavía.</p></div>';
    }
    html += '</div>';
    return html;
  }

  // ── FILTRADO: estadísticas de una competición concreta ────────────
  var sf = VIEW.statsFilter, c, titulo, subtitulo='';
  if(sf.type==='liga'){
    var ligaSel = getLiga(sf.id);
    c = DB.partidos.filter(function(p){return p.completado&&p.liga_id===sf.id;});
    titulo = ligaSel ? ligaSel.nombre : 'Liga';
    subtitulo = ligaSel ? ligaSel.temporada : '';
  } else if(sf.type==='torneo'){
    var torneoSel = getTorneo(sf.id);
    c = DB.partidos.filter(function(p){return p.completado&&p.torneo_id===sf.id;});
    titulo = torneoSel ? torneoSel.nombre : 'Torneo';
  } else {
    c = DB.partidos.filter(function(p){return p.completado&&!p.liga_id&&!p.torneo_id;});
    titulo = 'Partidos amistosos';
  }

  var bc = bcBase+'<span class="breadcrumb-link" id="bc-stats-picker">Estadísticas</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">'+titulo+'</span></div>';
  if(!c.length) return bc + bannerActa + '<div class="card"><p style="color:var(--mute);text-align:center;padding:40px">Sin partidos completados en esta competición todavía.</p></div>';

  var gM={}, pM={}, faltaM={}, fuM={}, tirosM={}, partM={};
  c.forEach(function(p){
    // Goles
    (p.goles||[]).forEach(function(g){
      if(g.tipo!=='autopista') gM[g.autor] = (gM[g.autor]||0) + 1;
    });
    // Porteros
    if(p.portero_local) pM[p.portero_local] = (pM[p.portero_local]||0) + (p.paradas_local||0);
    if(p.portero_visitante) pM[p.portero_visitante] = (pM[p.portero_visitante]||0) + (p.paradas_visitante||0);
    // Faltas
    (p.faltas||[]).forEach(function(f){ faltaM[f.jugador] = (faltaM[f.jugador]||0) + 1; });
    // Fueras de banda y tiros a gol por equipo
    if(p.local_id){
      fuM[p.local_id] = (fuM[p.local_id]||0) + (+(p.fueras_local)||0);
      tirosM[p.local_id] = (tirosM[p.local_id]||0) + (+(p.tiros_local)||0);
      partM[p.local_id] = (partM[p.local_id]||0) + 1;
    }
    if(p.visitante_id){
      fuM[p.visitante_id] = (fuM[p.visitante_id]||0) + (+(p.fueras_visitante)||0);
      tirosM[p.visitante_id] = (tirosM[p.visitante_id]||0) + (+(p.tiros_visitante)||0);
      partM[p.visitante_id] = (partM[p.visitante_id]||0) + 1;
    }
  });

  var tG = Object.entries(gM).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tP = Object.entries(pM).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tF = Object.entries(faltaM).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tFu = Object.entries(fuM).sort(function(a,b){return b[1]-a[1];});

  function bar(val, mx, color) {
    return '<div style="background:var(--felt-hi);border-radius:4px;height:5px;margin-top:3px">' +
      '<div style="background:'+color+';border-radius:4px;height:5px;width:'+(mx>0?(val/mx*100):0)+'%"></div></div>';
  }

  function rl(data, color, unit) {
    if(!data.length) return '<p style="color:var(--mute);font-size:13px">Sin datos</p>';
    var mx = data[0][1] || 1;
    return data.map(function(d, i) {
      return '<div style="margin-bottom:8px">' +
        '<div style="display:flex;justify-content:space-between">' +
        '<span style="font-size:13px;font-weight:600">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':'')+' ' + d[0] + '</span>' +
        '<span style="color:'+color+';font-weight:700">' + d[1] + unit + '</span></div>' +
        bar(d[1], mx, color) + '</div>';
    }).join('');
  }

  // Fueras de banda section
  var fuerasSection;
  if(!tFu.length) {
    fuerasSection = '<div class="card"><p class="section-title">Clavados por equipo</p><p style="color:var(--mute);font-size:13px">Sin datos de fueras registradas.</p></div>';
  } else {
    var mxFu = tFu[0][1] || 1;
    var filas = tFu.map(function(d) {
      var total = d[1];
      var pts = partM[d[0]] || 1;
      var prom = (total / pts).toFixed(1);
      return '<div style="margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:13px;font-weight:600">' + nEq(d[0]) + '</span>' +
        '<div><span style="color:#ff9800;font-weight:700;font-size:14px">' + total + ' total</span>' +
        '<span style="color:var(--mute);font-size:12px;margin-left:8px">' + prom + '/partido</span></div></div>' +
        bar(total, mxFu, '#ff9800') + '</div>';
    }).join('');
    fuerasSection = '<div class="card"><p class="section-title">Clavados por equipo</p>' + filas + '</div>';
  }

  return bc + bannerActa + '<div class="flex-col">' +
    '<h2 class="h2">📊 '+titulo+'</h2>'+(subtitulo?'<p style="color:var(--mute);font-size:13px;margin-top:2px;margin-bottom:4px">'+subtitulo+'</p>':'')+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">' +
    '<div class="card"><p class="section-title">Goleadores</p>' + rl(tG,'var(--win)',' goles') + '</div>' +
    '<div class="card"><p class="section-title">Porteros</p>' + rl(tP,'var(--chalk-dim)',' paradas') + '</div>' +
    '</div>' +
    '<div class="card"><p class="section-title">Más faltas</p>' + rl(tF,'#ffea00',' faltas') + '</div>' +
    fuerasSection +

    // Árbitros
    (function(){
      var aM = {};
      c.forEach(function(p){ if(p.arbitro && p.arbitro.trim()) aM[p.arbitro.trim()] = (aM[p.arbitro.trim()]||0) + 1; });
      var tA = Object.entries(aM).sort(function(a,b){return b[1]-a[1];});
      if(!tA.length) return '';
      var mx = tA[0][1]||1;
      return '<div class="card"><p class="section-title">Árbitros (partidos pitados)</p>' +
        tA.map(function(d,i){
          return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between">' +
            '<span style="font-size:13px;font-weight:600">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':'') + ' ' + d[0] + '</span>' +
            '<span style="color:#ce93d8;font-weight:700">' + d[1] + ' partidos</span></div>' +
            '<div style="background:var(--felt-hi);border-radius:4px;height:5px;margin-top:3px">' +
            '<div style="background:#ce93d8;border-radius:4px;height:5px;width:'+(d[1]/mx*100)+'%"></div></div></div>';
        }).join('') + '</div>';
    })() +

    // Más expulsados
    (function(){
      var xM = {};
      c.forEach(function(p){ (p.expulsiones||[]).forEach(function(x){ xM[x.jugador] = (xM[x.jugador]||0) + 1; }); });
      var tX = Object.entries(xM).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
      if(!tX.length) return '';
      var mx = tX[0][1]||1;
      return '<div class="card"><p class="section-title">Más expulsados</p>' +
        tX.map(function(d,i){
          return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between">' +
            '<span style="font-size:13px;font-weight:600">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':'') + ' ' + d[0] + '</span>' +
            '<span style="color:var(--carmin);font-weight:700">' + d[1] + ' exp.</span></div>' +
            '<div style="background:var(--felt-hi);border-radius:4px;height:5px;margin-top:3px">' +
            '<div style="background:var(--carmin);border-radius:0;height:5px;width:'+(d[1]/mx*100)+'%"></div></div></div>';
        }).join('') + '</div>';
    })() +

    // Goles por franja de minutos
    (function(){
      var franjas = [
        {label:'1-5',   min:1,  max:5},
        {label:'6-10',  min:6,  max:10},
        {label:'11-15', min:11, max:15},
        {label:'16-20', min:16, max:20},
        {label:'21-25', min:21, max:25},
        {label:'26-30', min:26, max:30},
        {label:'+30',   min:31, max:999},
      ];
      var counts = franjas.map(function(){ return 0; });
      var totalGoles = 0;
      c.forEach(function(p){
        (p.goles||[]).forEach(function(g){
          var min = +g.minuto||0;
          franjas.forEach(function(f,i){
            if(min >= f.min && min <= f.max) counts[i]++;
          });
          totalGoles++;
        });
      });
      if(!totalGoles) return '';
      var mx = Math.max.apply(null, counts) || 1;
      var barras = franjas.map(function(f,i){
        var pct = Math.round(counts[i]/totalGoles*100);
        var altura = Math.round(counts[i]/mx*100);
        return '<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:6px">' +
          '<span style="color:var(--win);font-weight:700;font-size:13px">' + (counts[i]||'') + '</span>' +
          '<div style="width:100%;background:var(--felt-hi);border-radius:2px 6px 0 0;position:relative;height:80px;display:flex;align-items:flex-end">' +
          '<div style="width:100%;background:var(--win);border-radius:2px 6px 0 0;height:' + altura + '%;transition:height .3s;min-height:' + (counts[i]>0?'4':'0') + 'px"></div>' +
          '</div>' +
          '<span style="color:var(--mute);font-size:11px;font-weight:600">' + f.label + '</span>' +
          (pct?'<span style="color:var(--mute);font-size:10px">' + pct + '%</span>':'<span style="font-size:10px"> </span>') +
          '</div>';
      }).join('');
      return '<div class="card"><p class="section-title">⏱ Goles por franja de minutos</p>' +
        '<div style="display:flex;gap:6px;align-items:flex-end;padding:8px 0 4px">' + barras + '</div>' +
        '<div style="display:flex;justify-content:center;margin-top:6px">' +
        '<span style="color:var(--mute);font-size:12px">Total: ' + totalGoles + ' goles en ' + c.length + ' partidos · ' + (totalGoles/c.length).toFixed(1) + ' goles/partido</span>' +
        '</div></div>';
    })() +

    // Tiros a gol por equipo
    (function(){
      var tT = Object.entries(tirosM).filter(function(d){return d[1]>0;}).sort(function(a,b){return b[1]-a[1];});
      if(!tT.length) return '';
      var mxT = tT[0][1] || 1;
      var totalTiros = tT.reduce(function(s,d){return s+d[1];},0);
      var golesTotal = c.reduce(function(s,p){return s+(p.goles_local||0)+(p.goles_visitante||0);},0);
      var filas = tT.map(function(d){
        var total = d[1];
        var pts = partM[d[0]] || 1;
        var prom = (total/pts).toFixed(1);
        var gEq = c.reduce(function(s,p){
          var gl = p.local_id===d[0]?(p.goles_local||0):0;
          var gv = p.visitante_id===d[0]?(p.goles_visitante||0):0;
          return s+gl+gv;
        },0);
        var efic = total>0 ? Math.round(gEq/total*100) : 0;
        return '<div style="margin-bottom:10px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span style="font-size:13px;font-weight:600">'+nEq(d[0])+'</span>' +
          '<div style="display:flex;gap:10px;align-items:center">' +
          '<span style="color:#a78bfa;font-weight:700;font-size:14px">'+total+' tiros</span>' +
          '<span style="color:var(--mute);font-size:12px">'+prom+'/partido</span>' +
          '<span style="color:var(--win);font-size:12px;font-weight:600">'+efic+'% efic.</span>' +
          '</div></div>' +
          '<div style="background:var(--felt-hi);border-radius:4px;height:5px;margin-top:3px">' +
          '<div style="background:#a78bfa;border-radius:4px;height:5px;width:'+(mxT>0?(total/mxT*100):0)+'%"></div></div></div>';
      }).join('');
      return '<div class="card"><p class="section-title">🎯 Tiros a gol por equipo</p>' + filas +
        '<div style="border-top:1px solid rgba(245,240,230,0.08);margin-top:8px;padding-top:8px;display:flex;gap:16px;flex-wrap:wrap">' +
        '<span style="color:var(--mute);font-size:12px">Total tiros: <b style="color:#a78bfa">'+totalTiros+'</b></span>' +
        '<span style="color:var(--mute);font-size:12px">Eficacia global: <b style="color:var(--win)">'+(totalTiros>0?Math.round(golesTotal/totalTiros*100):0)+'%</b></span>' +
        '</div></div>';
    })() +

    '<div class="card"><p class="section-title">Resumen de la temporada</p>' +
    '<div class="grid2">' +
    [['Partidos',c.length],
     ['Goles',c.reduce(function(s,p){return s+(p.goles_local||0)+(p.goles_visitante||0);},0)],
     ['Faltas',c.reduce(function(s,p){return s+(p.faltas||[]).length;},0)],
     ['Expulsiones',c.reduce(function(s,p){return s+(p.expulsiones||[]).length;},0)]
    ].map(function(r){
      return '<div class="card-sm" style="text-align:center">' +
        '<div style="font-family:Anton,sans-serif;font-size:26px;font-weight:700;color:var(--win);margin-top:4px">' + r[1] + '</div>' +
        '<div style="color:var(--mute);font-size:12px;margin-top:3px">' + r[0] + '</div></div>';
    }).join('') +
    '</div></div>' +
    '</div>';
}

function attachEvents() {
  // PIN / sesión árbitro
  var btnLogin=$('btn-login-pin'), btnCerrar=$('btn-cerrar-sesion');
  if(btnLogin) btnLogin.addEventListener('click', function(){
    var pin = window.prompt('Introduce el PIN de árbitro:');
    if(pin===null) return;
    if(activarModoÁrbitro(pin.trim())) { render(); }
    else { alert('PIN incorrecto.'); }
  });
  if(btnCerrar) btnCerrar.addEventListener('click', function(){
    if(window.confirm('¿¿Cerrar sesión de árbitro?')) { cerrarSesionÁrbitro(); render(); }
  });

  // Breadcrumbs
  var bcHome=$('bc-home'), bcLiga=$('bc-liga'), bcTorneo=$('bc-torneo'), bcStatsPicker=$('bc-stats-picker');
  if(bcHome) bcHome.addEventListener('click',function(){salvarWipActual();clearInterval(marcadorRefreshInterval);VIEW={screen:'home',ligaId:null,torneoId:null,statsFilter:null};render();});
  if(bcLiga) bcLiga.addEventListener('click',function(){salvarWipActual();VIEW.screen='liga';render();});
  if(bcTorneo) bcTorneo.addEventListener('click',function(){salvarWipActual();VIEW.screen='torneo';render();});
  if(bcStatsPicker) bcStatsPicker.addEventListener('click',function(){VIEW.statsFilter=null;render();});

  // Stats picker items
  document.querySelectorAll('.stats-picker-item').forEach(function(el){
    el.addEventListener('click',function(){
      var type=el.dataset.statsType, id=el.dataset.statsId;
      VIEW.statsFilter = {type:type, id:id||null};
      render();
    });
  });

  // Botón estadísticas de liga
  var blStats=$('btn-liga-stats');
  if(blStats) blStats.addEventListener('click',function(){
    VIEW.statsFilter={type:'liga',id:VIEW.ligaId};
    VIEW.screen='stats'; render();
  });

  // Botón marcador (global — accesible desde cualquier pantalla)
  var bmcG=$('btn-marcador');
  if(bmcG) bmcG.addEventListener('click',function(){salvarWipActual();clearInterval(marcadorRefreshInterval);VIEW.screen='marcador';render();});

  // Modal close
  var ov=$('modal-overlay'), cl=$('btn-modal-close');
  if(ov) ov.addEventListener('click',function(e){if(e.target===ov){MODAL={type:null,data:null,editando:false};render();}});
  if(cl) cl.addEventListener('click',function(){MODAL={type:null,data:null,editando:false};render();});

  // HOME events
  if(VIEW.screen==='home') attachHomeEvents();
  else if(VIEW.screen==='liga') attachLigaEvents();
  else if(VIEW.screen==='torneo') attachTorneoEvents();
  else if(VIEW.screen==='acta') attachActaEvents();
  else if(VIEW.screen==='marcador') attachMarcadorEvents();
  else if(VIEW.screen==='equipos') attachEquiposEvents();

  // Modal events
  if(MODAL.type==='partido') attachModalPartidoEvents();
  if(MODAL.type==='nueva-liga') attachModalNuevaLigaEvents();
  if(MODAL.type==='nuevo-torneo') attachModalNuevoTorneoEvents();
  if(MODAL.type==='equipo') attachModalEquipoEvents();
}

function attachHomeEvents(){
  var bnl=$('btn-nueva-liga'), bnt=$('btn-nuevo-torneo'), bas=$('btn-acta-suelta');
  var beq=$('btn-equipos'), bst=$('btn-stats-global');
  if(bnl) bnl.addEventListener('click',function(){MODAL={type:'nueva-liga',data:{},editando:false};render();});
  if(bnt) bnt.addEventListener('click',function(){MODAL={type:'nuevo-torneo',data:{},editando:false};render();});
  if(bas) bas.addEventListener('click',function(){
    var wipGuardado = loadWip();
    if(wipGuardado && !wipGuardado.partidoId && (wipGuardado.goles&&wipGuardado.goles.length || wipGuardado.jornada)) {
      if(!window.confirm('Hay un acta amistosa en borrador. ¿Continuar con ella?\n(Cancelar para empezar una nueva)')) {
        WIP=newWip(); saveWip(WIP);
      } else {
        WIP = wipGuardado;
      }
    } else {
      WIP=newWip(); saveWip(WIP);
    }
    VIEW.screen='acta'; render();
  });
  if(beq) beq.addEventListener('click',function(){VIEW.screen='equipos';render();});
  if(bst) bst.addEventListener('click',function(){
    VIEW.statsFilter = VIEW.ligaId ? {type:'liga',id:VIEW.ligaId} : VIEW.torneoId ? {type:'torneo',id:VIEW.torneoId} : null;
    VIEW.screen='stats'; render();
  });
  // Abrir liga
  document.querySelectorAll('[data-liga]').forEach(function(el){
    el.addEventListener('click',function(){VIEW={screen:'liga',ligaId:this.dataset.liga,torneoId:null};render();});
  });
  // Abrir torneo
  document.querySelectorAll('[data-torneo]').forEach(function(el){
    el.addEventListener('click',function(){VIEW={screen:'torneo',torneoId:this.dataset.torneo,ligaId:null};render();});
  });
  // Acta suelta
  document.querySelectorAll('[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=DB.partidos.find(function(x){return x.id===el.dataset.pid;});
      if(p){MODAL={type:'partido',data:clone(p),editando:false};render();}
    });
  });
}

function attachLigaEvents(){
  var bel=$('btn-eliminar-liga');
  if(bel) bel.addEventListener('click',function(){
    if(!window.confirm('¿Eliminar esta liga y todos sus partidos?')) return;
    eliminarLiga(VIEW.ligaId);
  });
  // Partidos del calendario
  document.querySelectorAll('[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=DB.partidos.find(function(x){return x.id===el.dataset.pid;});
      if(!p) return;
      if(!p.completado && esModoÁrbitro()) {
        if(!WIP.partidoId || WIP.partidoId !== p.id) {
          WIP=newWip();
          WIP.localId=p.local_id; WIP.visitanteId=p.visitante_id;
          WIP.ligaId=p.liga_id; WIP.torneoId=p.torneo_id;
          WIP.jornadaId=p.jornada_id; WIP.partidoId=p.id;
          var j=DB.jornadas.find(function(x){return x.id===p.jornada_id;});
          if(j){ WIP.jornada=j.numero; }
          saveWip(WIP);
        }
        VIEW.screen='acta'; render();
      } else {
        MODAL={type:'partido',data:clone(p),editando:false};render();
      }
    });
  });
}

function attachTorneoEvents(){
  var bet=$('btn-eliminar-torneo');
  if(bet) bet.addEventListener('click',function(){
    if(!window.confirm('¿Eliminar este torneo?')) return;
    eliminarTorneo(VIEW.torneoId);
  });
  document.querySelectorAll('[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=DB.partidos.find(function(x){return x.id===el.dataset.pid;});
      if(!p) return;
      if(!p.completado && esModoÁrbitro()){
        if(!WIP.partidoId || WIP.partidoId !== p.id) {
          WIP=newWip();
          WIP.localId=p.local_id; WIP.visitanteId=p.visitante_id;
          WIP.torneoId=p.torneo_id; WIP.ligaId=p.liga_id;
          WIP.jornadaId=p.jornada_id; WIP.partidoId=p.id;
          var j=DB.jornadas.find(function(x){return x.id===p.jornada_id;});
          if(j){ WIP.jornada=j.numero; }
          saveWip(WIP);
        }
        VIEW.screen='acta'; render();
      } else {
        MODAL={type:'partido',data:clone(p),editando:false};render();
      }
    });
  });
}

function attachEquiposEvents(){
  var add=$('btn-add-eq');
  if(add) add.addEventListener('click',function(){
    var n=($('eq-nombre').value||'').trim();
    if(!n) return;
    if(DB.equipos.find(function(e){return e.nombre.toLowerCase()===n.toLowerCase()&&!e.liga_id&&!e.torneo_id;})){alert('Ya existe.');return;}
    add.disabled=true;
    db.from('jugadores').insert({id:uid(),nombre:n}).then(function(res){
      if(res.error){alert('Error: '+res.error.message);add.disabled=false;return;}
      cargar().then(render);
    });
  });
  document.querySelectorAll('.del-eq').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(!window.confirm('¿Eliminar equipo?')) return;
      db.from('jugadores').delete().eq('id',this.dataset.eid).then(function(){ cargar().then(render); });
    });
  });
}

function attachModalEquipoEvents(){
  var e = MODAL.data;
  if(!e) return;
  var close = $('btn-modal-close');
  if(close) close.addEventListener('click',function(){MODAL={type:null,data:null,editando:false};render();});

  // ── Preview en vivo del kit ──
  function updatePreview(){
    var p1 = ($('kit-primary')&&$('kit-primary').value)||'#4a6b4a';
    var p2 = ($('kit-secondary')&&$('kit-secondary').value)||'#2a3a2a';
    var pat = (document.querySelector('input[name="kit-patron"]:checked')||{}).value||'solid';
    var prev = document.getElementById('kit-preview');
    if(prev) prev.innerHTML = buttonSVGFromKit({primary:p1,secondary:p2,pattern:pat}, 80);
  }
  var kp=$('kit-primary'), ks=$('kit-secondary');
  if(kp){ kp.addEventListener('input',updatePreview); }
  if(ks){ ks.addEventListener('input',updatePreview); }
  document.querySelectorAll('input[name="kit-patron"]').forEach(function(r){
    r.addEventListener('change',updatePreview);
  });

  // ── Guardar kit ──
  var saveKit = $('btn-kit-save');
  if(saveKit) saveKit.addEventListener('click',function(){
    var p1 = $('kit-primary').value;
    var p2 = $('kit-secondary').value;
    var pat = (document.querySelector('input[name="kit-patron"]:checked')||{}).value||'solid';
    saveKit.disabled=true;
    db.from('jugadores').update({color_primario:p1,color_secundario:p2,patron:pat}).eq('id',e.id).then(function(res){
      if(res.error){alert('Error guardando kit: '+res.error.message);saveKit.disabled=false;return;}
      cargar().then(function(){
        MODAL.data = DB.equipos.find(function(x){return x.id===e.id;}) || MODAL.data;
        render();
      });
    });
  });

  // ── Añadir jugador ──
  var addJug = $('btn-add-jugador');
  if(addJug) addJug.addEventListener('click',function(){
    var nombre  = ($('new-jug-nombre').value||'').trim();
    var pos     = ($('new-jug-pos')&&$('new-jug-pos').value)||'';
    var dorsalV = ($('new-jug-dorsal')&&$('new-jug-dorsal').value)||'';
    var dorsal  = dorsalV ? parseInt(dorsalV,10) : null;
    if(!nombre){$('new-jug-nombre').focus();return;}
    // Evitar duplicados (case-insensitive) en el mismo equipo
    var existe = DB.plantilla.some(function(j){
      return j.equipo_id===e.id && j.nombre.toLowerCase()===nombre.toLowerCase();
    });
    if(existe){alert('Ya existe un jugador con ese nombre en este equipo.');return;}
    addJug.disabled=true;
    db.from('plantilla').insert({id:uid(),equipo_id:e.id,nombre:nombre,posicion:pos,dorsal:dorsal}).then(function(res){
      if(res.error){alert('Error: '+res.error.message);addJug.disabled=false;return;}
      cargar().then(function(){
        MODAL.data = DB.equipos.find(function(x){return x.id===e.id;}) || MODAL.data;
        render();
      });
    });
  });
  // Enter en el campo nombre añade jugador
  var njn = $('new-jug-nombre');
  if(njn) njn.addEventListener('keydown',function(ev){if(ev.key==='Enter'&&addJug)addJug.click();});

  // ── Eliminar jugador ──
  document.querySelectorAll('.del-jugador').forEach(function(btn){
    btn.addEventListener('click',function(){
      var jid = this.dataset.jid;
      if(!window.confirm('¿Eliminar jugador?')) return;
      db.from('plantilla').delete().eq('id',jid).then(function(){
        cargar().then(function(){
          MODAL.data = DB.equipos.find(function(x){return x.id===e.id;}) || MODAL.data;
          render();
        });
      });
    });
  });
}

var PROXIMA_FUERAS = [7, 11, 15, 19];

function playBuzzer(){ playSound('snd-proxima'); }

function playSound(id) {
  var el = document.getElementById(id);
  if(!el) return;
  try { el.currentTime = 0; } catch(e) {}
  try { el.play().catch(function(){}); } catch(e) {}
}

function cargarAudios(gol, inicio, final_) {
  var g = document.getElementById('snd-gol');
  var i = document.getElementById('snd-inicio');
  var f = document.getElementById('snd-final');
  if(g) g.src = gol;
  if(i) i.src = inicio;
  if(f) f.src = final_;
}

if(CONFIGURED){
  cargar().then(render);

  db.channel('lb')
    .on('postgres_changes',{event:'*',schema:'public',table:'jugadores'},function(){if(VIEW.screen!=='acta'){cargar().then(render);}})
    .on('postgres_changes',{event:'*',schema:'public',table:'plantilla'},function(){if(VIEW.screen!=='acta'){cargar().then(render);}})

    .on('postgres_changes',{event:'*',schema:'public',table:'torneos'},function(){if(VIEW.screen!=='acta'){cargar().then(render);}})
    .on('postgres_changes',{event:'*',schema:'public',table:'partidos'},function(){
      if(VIEW.screen==='marcador'){_recargarPartidosYActualizar();}
      else if(VIEW.screen!=='acta'){cargar().then(render);}
    })
    .subscribe();
} else {
  render();
}
