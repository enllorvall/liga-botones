// ── GENERADOR DE CALENDARIOS ──────────────────────────────────────
// Algoritmo round-robin para N equipos
function generarCalendario(equipoIds, vueltas) {
  var eqs = equipoIds.slice();
  var impar = eqs.length % 2 !== 0;
  if(impar) eqs.push('BYE'); // equipo ficticio para descanso
  var n = eqs.length;
  var jornadas = [];
  var rondasPorVuelta = n - 1;
  for(var vuelta = 0; vuelta < vueltas; vuelta++) {
    for(var ronda = 0; ronda < rondasPorVuelta; ronda++) {
      var partidos = [];
      for(var i = 0; i < n/2; i++) {
        var local = eqs[i];
        var visitante = eqs[n-1-i];
        // En segunda vuelta invertir local/visitante
        if(vuelta % 2 === 1) { var tmp=local; local=visitante; visitante=tmp; }
        if(local !== 'BYE' && visitante !== 'BYE') {
          partidos.push({local:local, visitante:visitante});
        }
      }
      jornadas.push({numero: vuelta*rondasPorVuelta + ronda + 1, partidos:partidos});
      // Rotar equipos (el primero fijo)
      var ultimo = eqs.splice(n-1,1)[0];
      eqs.splice(1,0,ultimo);
    }
  }
  return jornadas;
}

// Generador para eliminatorias (cuadros)
function generarEliminatorias(equipoIds) {
  var n = equipoIds.length;
  var rondas = [];
  // Primera ronda: emparejar 1vs2, 3vs4, etc.
  var partidos = [];
  for(var i=0; i<Math.floor(n/2); i++) {
    partidos.push({local:equipoIds[i*2], visitante:equipoIds[i*2+1]});
  }
  rondas.push({numero:1, nombre:'Fase de grupos / 1a ronda', partidos:partidos});
  // Si hay potencia de 2, generar más rondas vacías
  var siguientes = Math.ceil(n/2);
  var numRonda = 2;
  while(siguientes > 1) {
    var ps = [];
    for(var j=0; j<Math.floor(siguientes/2); j++) {
      ps.push({local:'Por determinar', visitante:'Por determinar'});
    }
    var nombre = siguientes===2?'Final':siguientes===4?'Semifinales':siguientes===8?'Cuartos':'Ronda '+numRonda;
    rondas.push({numero:numRonda, nombre:nombre, partidos:ps});
    siguientes = Math.ceil(siguientes/2);
    numRonda++;
  }
  return rondas;
}

// ── CLASIFICACION ─────────────────────────────────────────────────
function calcTabla(eqIds, partidos) {
  var t = {};
  eqIds.forEach(function(id){ t[id]={id:id,PJ:0,PG:0,PE:0,PP:0,GF:0,GC:0,PTS:0}; });
  partidos.filter(function(p){return p.completado;}).forEach(function(p){
    var l=t[p.local_id], v=t[p.visitante_id];
    if(!l||!v) return;
    l.PJ++;v.PJ++;l.GF+=p.goles_local;l.GC+=p.goles_visitante;v.GF+=p.goles_visitante;v.GC+=p.goles_local;
    if(p.goles_local>p.goles_visitante){l.PG++;l.PTS+=3;v.PP++;}
    else if(p.goles_local<p.goles_visitante){v.PG++;v.PTS+=3;l.PP++;}
    else{l.PE++;v.PE++;l.PTS++;v.PTS++;}
  });
  return Object.values(t).sort(function(a,b){return b.PTS-a.PTS||(b.GF-b.GC)-(a.GF-a.GC)||b.GF-a.GF;});
}

function buildLiga() {
  var liga = getLiga(VIEW.ligaId);
  if(!liga) return '<p style="color:#ff3d57">Liga no encontrada.</p>';
  var eqSet={};DB.partidos.filter(function(p){return p.liga_id===liga.id;}).forEach(function(p){eqSet[p.local_id]=true;eqSet[p.visitante_id]=true;});var eqIds=Object.keys(eqSet);
  var psLiga = partidosDe(liga.id, null);
  var tabla = calcTabla(eqIds, psLiga);
  var jornadas = jornadasDe(liga.id, null).sort(function(a,b){return a.numero-b.numero;});

  // Tabla clasificacion
  var tablaHtml = '';
  if(tabla.length) {
    var rows = tabla.map(function(e,i){
      var med = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      return '<tr style="border-top:1px solid #1e2d47;background:'+(i===0?'rgba(255,214,0,0.07)':'transparent')+'">' +
        '<td style="padding:8px 7px;text-align:center">'+med+'</td>' +
        '<td style="padding:8px 7px;font-weight:600">'+nEq(e.id)+'</td>' +
        [e.PJ,e.PG,e.PE,e.PP,e.GF,e.GC,e.GF-e.GC].map(function(v){return '<td style="padding:8px 7px;text-align:center;color:#6b7a99;font-size:13px">'+v+'</td>';}).join('') +
        '<td style="padding:8px 7px;text-align:center;font-weight:700;color:#00e676;font-size:16px">'+e.PTS+'</td></tr>';
    }).join('');
    tablaHtml = '<div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">' +
      '<table style="width:100%;border-collapse:collapse;min-width:360px">' +
      '<thead><tr style="background:#1a2438">'+['#','Equipo','PJ','PG','PE','PP','GF','GC','DG','PTS'].map(function(h,i){return '<th style="padding:9px 7px;font-size:11px;color:#6b7a99;text-transform:uppercase;letter-spacing:1px;font-weight:600;text-align:'+(i===1?'left':'center')+'">'+h+'</th>';}).join('')+'</tr></thead>' +
      '<tbody>'+rows+'</tbody></table></div>';
  }

  // Calendario por jornadas
  var calHtml = '<h3 class="h3" style="margin-bottom:12px">📅 Calendario</h3>';
  if(!jornadas.length) {
    calHtml += '<p style="color:#6b7a99;font-size:13px">El calendario se generara al crear la liga.</p>';
  } else {
    jornadas.forEach(function(j) {
      var ps = partidosDeJornada(j.id);
      var todos = ps.length;
      var jugados = ps.filter(function(p){return p.completado;}).length;
      calHtml += '<div class="card" style="margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">' +
        '<h3 class="h3" style="font-size:15px">Jornada '+j.numero+'</h3>' +
        '<span style="color:#6b7a99;font-size:12px">'+jugados+'/'+todos+' jugados</span>' +
        '</div>';
      if(!ps.length) {
        calHtml += '<p style="color:#6b7a99;font-size:13px">Sin partidos en esta jornada.</p>';
      } else {
        ps.forEach(function(p) {
          var jugado = p.completado;
          calHtml += '<div class="'+(jugado?'partido-jugado':'partido-pendiente')+' card-sm" style="margin-bottom:7px;background:'+(jugado?'rgba(79,195,247,0.05)':'rgba(0,230,118,0.03)')+'" data-pid="'+p.id+'">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">' +
            '<span style="font-weight:600;font-size:14px;flex:1;text-align:right">'+nEq(p.local_id)+'</span>' +
            (jugado
              ? '<div style="background:#1a2438;border-radius:8px;padding:4px 14px;font-family:\'Oswald\',sans-serif;font-size:20px;font-weight:700;color:#4fc3f7;letter-spacing:3px;white-space:nowrap">'+p.goles_local+' – '+p.goles_visitante+'</div>'
              : '<div style="background:#1a2438;border-radius:8px;padding:4px 14px;font-family:\'Oswald\',sans-serif;font-size:16px;font-weight:700;color:#1e2d47;letter-spacing:3px;white-space:nowrap">vs</div>') +
            '<span style="font-weight:600;font-size:14px;flex:1">'+nEq(p.visitante_id)+'</span>' +
            '<span class="badge" style="background:rgba('+(jugado?'79,195,247':'0,230,118')+',0.1);color:'+(jugado?'#4fc3f7':'#00e676')+';margin-left:4px">'+(jugado?'✓':'▶')+'</span>' +
            '</div></div>';
        });
      }
      calHtml += '</div>';
    });
  }

  var btn_eliminar = '<button class="btn btn-red" id="btn-eliminar-liga" style="font-size:12px;padding:6px 12px">🗑 Eliminar liga</button>';

  return '<div>' +
    '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">'+liga.nombre+'</span></div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">' +
    '<div><h2 class="h2">'+liga.nombre+'</h2><p style="color:#6b7a99;font-size:13px;margin-top:3px">'+liga.temporada+' · '+eqIds.length+' equipos · '+liga.vueltas+' vuelta'+( liga.vueltas>1?'s':'')+'</p></div>' +
    '<div style="display:flex;gap:6px">'+btn_eliminar+'</div>' +
    '</div>' +
    '<h3 class="h3" style="margin-bottom:12px">🏆 Clasificacion</h3>' +
    tablaHtml + calHtml + '</div>';
}

// ── PANTALLA TORNEO ────────────────────────────────────────────────
function buildTorneo() {
  var torneo = getTorneo(VIEW.torneoId);
  if(!torneo) return '<p style="color:#ff3d57">Torneo no encontrado.</p>';
  var eqSet={};DB.partidos.filter(function(p){return p.torneo_id===torneo.id;}).forEach(function(p){eqSet[p.local_id]=true;eqSet[p.visitante_id]=true;});var eqIds=Object.keys(eqSet);
  var psTorneo = partidosDe(null, torneo.id);
  var jornadas = jornadasDe(null, torneo.id).sort(function(a,b){return a.numero-b.numero;});

  var contenido = '';
  if(torneo.tipo === 'todos_contra_todos') {
    var tabla = calcTabla(eqIds, psTorneo);
    if(tabla.length) {
      var rows = tabla.map(function(e,i){
        var med = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        return '<tr style="border-top:1px solid #1e2d47;background:'+(i===0?'rgba(255,214,0,0.07)':'transparent')+'">' +
          '<td style="padding:8px 7px;text-align:center">'+med+'</td>' +
          '<td style="padding:8px 7px;font-weight:600">'+nEq(e.id)+'</td>' +
          [e.PJ,e.PG,e.PE,e.PP,e.GF,e.GC,e.GF-e.GC].map(function(v){return '<td style="padding:8px 7px;text-align:center;color:#6b7a99;font-size:13px">'+v+'</td>';}).join('') +
          '<td style="padding:8px 7px;text-align:center;font-weight:700;color:#ffd600;font-size:16px">'+e.PTS+'</td></tr>';
      }).join('');
      contenido += '<div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">' +
        '<table style="width:100%;border-collapse:collapse;min-width:360px">' +
        '<thead><tr style="background:#1a2438">'+['#','Equipo','PJ','PG','PE','PP','GF','GC','DG','PTS'].map(function(h,i){return '<th style="padding:9px 7px;font-size:11px;color:#6b7a99;text-transform:uppercase;font-weight:600;text-align:'+(i===1?'left':'center')+'">'+h+'</th>';}).join('')+'</tr></thead>' +
        '<tbody>'+rows+'</tbody></table></div>';
    }
  }

  contenido += '<h3 class="h3" style="margin-bottom:12px">📅 Partidos</h3>';
  jornadas.forEach(function(j) {
    var ps = partidosDeJornada(j.id);
    contenido += '<div class="card" style="margin-bottom:10px">' +
      '<h3 class="h3" style="font-size:15px;margin-bottom:10px">'+(j.nombre||'Jornada '+j.numero)+'</h3>';
    ps.forEach(function(p) {
      var jugado = p.completado;
      contenido += '<div class="'+(jugado?'partido-jugado':'partido-pendiente')+' card-sm" style="margin-bottom:7px;background:'+(jugado?'rgba(79,195,247,0.05)':'rgba(255,214,0,0.03)')+'" data-pid="'+p.id+'">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">' +
        '<span style="font-weight:600;font-size:14px;flex:1;text-align:right">'+nEq(p.local_id)+'</span>' +
        (jugado?'<div style="background:#1a2438;border-radius:8px;padding:4px 14px;font-family:\'Oswald\',sans-serif;font-size:20px;font-weight:700;color:#4fc3f7;letter-spacing:3px">'+p.goles_local+' – '+p.goles_visitante+'</div>':'<div style="background:#1a2438;border-radius:8px;padding:4px 14px;font-family:\'Oswald\',sans-serif;font-size:16px;color:#1e2d47;letter-spacing:3px">vs</div>') +
        '<span style="font-weight:600;font-size:14px;flex:1">'+nEq(p.visitante_id)+'</span>' +
        '<span class="badge" style="background:rgba('+(jugado?'79,195,247':'255,214,0')+',0.1);color:'+(jugado?'#4fc3f7':'#ffd600')+';">'+(jugado?'✓':'▶')+'</span>' +
        '</div></div>';
    });
    contenido += '</div>';
  });

  return '<div>' +
    '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">'+torneo.nombre+'</span></div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">' +
    '<div><h2 class="h2">'+torneo.nombre+'</h2><p style="color:#6b7a99;font-size:13px;margin-top:3px">'+torneo.tipo+' · '+eqIds.length+' equipos</p></div>' +
    '<button class="btn btn-red" id="btn-eliminar-torneo" style="font-size:12px;padding:6px 12px">🗑 Eliminar</button>' +
    '</div>' + contenido + '</div>';
}

// ── MODAL PARTIDO (ver/editar acta) ───────────────────────────────
function buildModalPartido() {
  var p = MODAL.data;
  var ed = MODAL.editando;
  if(!p) return '';
  var nL = nEq(p.local_id), nV = nEq(p.visitante_id);
  var optsEq = '<option value="local">'+nL+'</option><option value="visitante">'+nV+'</option>';
  var completado = p.completado;

  function evRow(items, color, tipo) {
    return (items||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;}).map(function(it){
      var txt = it.autor||it.jugador||(it.sale?it.sale+' / '+it.entra:'')||'';
      var eqBadge = it.equipo ? '<span class="badge" style="background:rgba('+(it.equipo==='local'?'0,230,118':'255,214,0')+',0.15);color:'+(it.equipo==='local'?'#00e676':'#ffd600')+'">'+(it.equipo==='local'?nL:nV)+'</span>' : '';
      var tBadge = it.tarjeta ? '<span class="badge" style="background:rgba('+(it.tarjeta==='roja'?'255,61,87':'255,234,0')+',0.15);color:'+(it.tarjeta==='roja'?'#ff3d57':'#ffea00')+'">'+(it.tarjeta==='roja'?'Roja':'Amarilla')+'</span>' : '';
      var mBadge = it.motivo ? '<span class="badge" style="background:rgba(255,61,87,0.15);color:#ff3d57">'+it.motivo+'</span>' : '';
      return '<div class="evento-row"><span style="color:rgb('+color+');font-weight:700;min-width:32px">'+pad(it.minuto)+"'</span><span style='font-weight:600;flex:1'>"+txt+'</span>'+eqBadge+tBadge+mBadge+(ed?'<button class="btn btn-ghost del-evento" data-tipo="'+tipo+'" data-id="'+it.id+'" style="padding:3px 8px;font-size:13px;margin-left:auto">X</button>':'')+'</div>';
    }).join('');

  var marcador = ed
    ? '<div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:10px;align-items:end;margin-bottom:12px"><div><label class="label">'+nL+'</label><input type="number" id="md-gL" value="'+(p.goles_local||0)+'" min="0" class="inp"/></div><div style="color:#6b7a99;text-align:center;padding-bottom:8px;font-size:22px">-</div><div><label class="label">'+nV+'</label><input type="number" id="md-gV" value="'+(p.goles_visitante||0)+'" min="0" class="inp"/></div></div>'

  var porteros = ed ? '<div class="form-add" style="margin-bottom:10px"><p class="section-title">Porteros</p><div class="grid2"><div><label class="label">'+nL+'</label><input type="text" id="md-portL" value="'+(p.portero_local||'')+'" class="inp"/></div><div><label class="label">'+nV+'</label><input type="text" id="md-portV" value="'+(p.portero_visitante||'')+'" class="inp"/></div></div></div>' : '';

  var contadores = ed ? '<div class="form-add" style="margin-bottom:10px"><p class="section-title">Paradas y fueras de banda</p><div class="grid2"><div><label class="label">Paradas '+nL+'</label><div class="counter"><button class="counter-btn" id="md-pL-dec">-</button><span class="counter-val" id="md-pL-val" style="color:#4fc3f7">'+(p.paradas_local||0)+'</span><button class="counter-btn" id="md-pL-inc">+</button></div></div><div><label class="label">Paradas '+nV+'</label><div class="counter"><button class="counter-btn" id="md-pV-dec">-</button><span class="counter-val" id="md-pV-val" style="color:#4fc3f7">'+(p.paradas_visitante||0)+'</span><button class="counter-btn" id="md-pV-inc">+</button></div></div><div><label class="label">Fueras '+nL+'</label><div class="counter"><button class="counter-btn" id="md-fL-dec">-</button><span class="counter-val" id="md-fL-val" style="color:#00e676">'+(p.fueras_local||0)+'</span><button class="counter-btn" id="md-fL-inc">+</button></div></div><div><label class="label">Fueras '+nV+'</label><div class="counter"><button class="counter-btn" id="md-fV-dec">-</button><span class="counter-val" id="md-fV-val" style="color:#ffd600">'+(p.fueras_visitante||0)+'</span><button class="counter-btn" id="md-fV-inc">+</button></div></div></div></div>' : '';

  var fGol = ed ? '<div class="form-add"><div class="grid2" style="margin-bottom:8px"><div><label class="label">Min</label><input type="number" id="add-gol-min" min="1" placeholder="Min" class="inp"/></div><div><label class="label">Goleador</label><input type="text" id="add-gol-jug" placeholder="Nombre" class="inp"/></div></div><div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end"><div><label class="label">Equipo</label><select id="add-gol-eq" class="sel">'+optsEq+'</select></div><div><label class="label">Tipo</label><select id="add-gol-tipo" class="sel"><option value="normal">Normal</option><option value="falta">De falta</option><option value="autopista">En propia</option></select></div><button class="btn btn-green" id="btn-add-gol-md">+ Gol</button></div></div>' : '';

  var fFalta = ed ? '<div class="form-add"><div class="grid2" style="margin-bottom:8px"><div><label class="label">Min</label><input type="number" id="add-falt-min" min="1" placeholder="Min" class="inp"/></div><div><label class="label">Jugador</label><input type="text" id="add-falt-jug" placeholder="Nombre" class="inp"/></div></div><div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end"><div><label class="label">Equipo</label><select id="add-falt-eq" class="sel">'+optsEq+'</select></div><button class="btn btn-yellow" id="btn-add-falt-md">+ Falta</button></div></div>' : '';

  var fExp = ed ? '<div class="form-add"><div class="grid2" style="margin-bottom:8px"><div><label class="label">Min</label><input type="number" id="add-exp-min" min="1" placeholder="Min" class="inp"/></div><div><label class="label">Jugador</label><input type="text" id="add-exp-jug" placeholder="Nombre" class="inp"/></div></div><div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end"><div><label class="label">Equipo</label><select id="add-exp-eq" class="sel">'+optsEq+'</select></div><div><label class="label">Motivo</label><select id="add-exp-mot" class="sel"><option value="doble falta">Doble falta</option><option value="fueras de banda">Clavados (fueras de banda)</option></select></div><button class="btn btn-red" id="btn-add-exp-md">+ Exp.</button></div></div>' : '';

  var fCam = ed ? '<div class="form-add"><div class="grid2" style="margin-bottom:8px"><div><label class="label">Min</label><input type="number" id="add-cam-min" min="1" placeholder="Min" class="inp"/></div><div><label class="label">Equipo</label><select id="add-cam-eq" class="sel">'+optsEq+'</select></div></div><div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end"><div><label class="label">Sale</label><input type="text" id="add-cam-sale" placeholder="Sale" class="inp"/></div><div><label class="label">Entra</label><input type="text" id="add-cam-entra" placeholder="Entra" class="inp"/></div><button class="btn btn-purple" id="btn-add-cam-md">+ Cambio</button></div></div>' : '';

  var notasSection = ed ? '<div style="margin-top:12px"><label class="label">Notas</label><textarea id="md-notas" class="inp" style="resize:vertical;min-height:60px">'+(p.notas||'')+'</textarea></div>' : (p.notas?'<div style="margin-top:12px"><p class="section-title">Notas</p><p style="color:#e8eaf0;font-size:13px;line-height:1.6;background:#1a2438;border-radius:8px;padding:10px">'+p.notas+'</p></div>':'');

  return '<div class="modal-overlay" id="modal-overlay"><div class="modal-box">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap">'+
    '<h2 class="h2">'+(completado?'Acta':'Partido')+' '+(p.jornada_nombre||'')+(ed?' - Editando':'')+'</h2>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
    (!completado&&!ed?'<button class="btn btn-green" id="btn-ir-acta">Rellenar acta</button>':'')+
    (completado&&!ed?'<button class="btn btn-gold" id="btn-modal-edit">Editar</button>':'')+

    '<p class="section-title" style="margin-top:10px">Faltas</p>'+(!(p.faltas&&p.faltas.length)?'<p style="color:#1e2d47;font-size:12px;padding-bottom:8px">Sin faltas</p>':'')+evRow(p.faltas,'255,234,0','faltas')+fFalta+

  var p = MODAL.data;

// ── CRONOMETRO ────────────────────────────────────────────────────
function cronTick(){
  CRON.seg++; CRON.min=Math.floor(CRON.seg/60); CRON.sec=CRON.seg%60;
  var limite=900+CRON.extra*60;
  if(CRON.seg>=limite&&!cronAlertado){cronAlertado=true;CRON.alerta=true;salvarWipActual();render();return;}
  var d=$('crono-display'), st=$('crono-status');
  if(d) d.textContent=pad(CRON.min)+':'+pad(CRON.sec);
  if(st){var minP=CRON.parte===1?CRON.min:15+CRON.min; st.textContent='Parte '+CRON.parte+' · min '+minP;}
}
function cronIniciar(){
  if(!cronPartidoIniciado){ playSound('snd-inicio'); cronPartidoIniciado=true; }
  CRON.run=true;CRON.alerta=false;cronAlertado=false;clearInterval(cronInterval);cronInterval=setInterval(cronTick,1000);salvarWipActual();render();
}
function cronPausar(){CRON.run=false;clearInterval(cronInterval);salvarWipActual();render();}
function cronSig2(){clearInterval(cronInterval);CRON.run=false;CRON.parte=2;CRON.seg=0;CRON.min=0;CRON.sec=0;CRON.extra=0;CRON.alerta=false;cronAlertado=false;salvarWipActual();render();}
function cronFin(){clearInterval(cronInterval);CRON.run=false;CRON.fin=true;salvarWipActual();render();}
function cronReset(){clearInterval(cronInterval);CRON.run=false;CRON.seg=0;CRON.min=0;CRON.sec=0;CRON.parte=1;CRON.fin=false;CRON.extra=0;CRON.alerta=false;cronAlertado=false;cronPartidoIniciado=false;}

// ── SUPABASE ──────────────────────────────────────────────────────
async function cargar(){
  try{
    // Cargar todo en paralelo
    var [re, rl, rt, rj, rp] = await Promise.all([
      db.from('jugadores').select('*').order('created_at'),
      db.from('ligas').select('*').order('created_at'),
      db.from('torneos').select('*').order('created_at'),
      db.from('jornadas').select('*').order('numero'),
      db.from('partidos').select('*').order('created_at')
    ]);
    if(re.error) throw re.error;
    DB.equipos=re.data||[];
    DB.ligas=rl.data||[];
    DB.torneos=rt.data||[];
    DB.jornadas=rj.data||[];
    DB.partidos=rp.data||[];
    // Añadir nombre de jornada a cada partido para el modal
    DB.partidos.forEach(function(p){
      if(p.jornada_id){
        var j=DB.jornadas.find(function(x){return x.id===p.jornada_id;});
        if(j) p.jornada_nombre=(j.nombre||'Jornada '+j.numero);
      }
    });
  } catch(e){ console.error('Error cargando datos:',e); }
}

function guardarEdicion(p){
  var id=p.id; var datos=clone(p); delete datos.id; delete datos.jornada_nombre;
  db.from('partidos').update(datos).eq('id',id).then(function(res){
    if(res.error){alert('Error: '+res.error.message);return;}
    cargar().then(function(){
      MODAL.editando=false;
      var updated=DB.partidos.find(function(x){return x.id===id;});
      if(updated) MODAL.data=clone(updated);
      render();
    });
  });
}

function imprimirActa(p){
  var nL=nEq(p.local_id), nV=nEq(p.visitante_id);
  function pad2(n){return String(n).padStart(2,"0");}
  function fila(min,a,b,col){return '<tr><td style="padding:4px 8px;font-weight:700;color:'+col+';white-space:nowrap">'+pad2(min)+"'</td><td style='padding:4px 8px;font-weight:600'>"+a+"</td><td style='padding:4px 8px;color:#555;font-size:12px'>"+b+"</td></tr>";}
  function celda(n,tot){var a=n<=tot,hh=n===8||n===12||n===16;return '<span style="display:inline-flex;width:17px;height:17px;border:1px solid '+(a?(hh?"#c00":"#555"):"#ccc")+';border-radius:3px;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin:1px;background:'+(a&&hh?"#fee":"white")+';color:'+(a?(hh?"#c00":"#333"):"transparent")+'">'+(a?(hh?"!":"x"):"")+'</span>';}
  var mx=Math.max(p.fueras_local||0,p.fueras_visitante||0,8);
  var bL="",bV="";for(var i=1;i<=mx;i++){bL+=celda(i,p.fueras_local||0);bV+=celda(i,p.fueras_visitante||0);}
  var gs=(p.goles||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});
  var fs=(p.faltas||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});
  var xs=(p.expulsiones||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});
  var cs=(p.cambios||[]).slice().sort(function(a,b){return +a.minuto-+b.minuto;});

  if(s.run) cronBtns+='<button class="btn btn-yellow" id="cron-pausar">Pausar</button>';
  if(s.alerta&&s.parte===1&&!s.fin) cronBtns+='<button class="btn btn-blue" id="cron-sig2">2a parte</button>';
  if(s.alerta&&s.parte===2&&!s.fin) cronBtns+='<button class="btn btn-red" id="cron-fin">Fin</button>';
  if(s.fin) cronBtns+='<button class="btn btn-ghost" id="cron-reset">Reset</button>';
  cronBtns += '<button class="btn btn-ghost" id="btn-pitido-final" title="Sonido final del partido" style="font-size:18px;padding:6px 10px">📣</button>';
  var bc='<div class="breadcrumb" style="display:flex;justify-content:space-between;align-items:center"><div><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Marcador</span></div><button class="btn btn-ghost" id="btn-marcador-refresh" style="font-size:12px;padding:5px 10px">Actualizar</button></div>';
  if(!ultimo) return bc+'<div style="text-align:center;padding:60px"><h2 class="h2">Marcador en directo</h2><p style="color:#6b7a99;margin-top:8px">Aparecera cuando empieces un acta.</p></div>';

    golesHtml+='<div style="display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;background:#1a2438;margin-bottom:6px"><div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;color:#00e676;min-width:40px">'+pad(g.minuto)+"'</div><div style='flex:1'><div style='font-weight:700'>"+g.autor+'</div><div style="color:#6b7a99;font-size:12px">'+eqN+'</div></div><span class="badge" style="background:rgba('+rgba+',0.15);color:'+col+'">'+eqN+'</span></div>';
  });
  var cronStatus=s.fin?'FIN':(s.alerta?'Fin parte '+s.parte:(s.run?'Parte '+s.parte+' min '+minP:'Parte '+s.parte+' pausado'));
  var extraInput=!s.fin?'<div style="display:flex;align-items:center;gap:6px"><span style="color:#6b7a99;font-size:11px">+min extra:</span><input type="number" id="cron-extra" min="0" max="10" value="'+s.extra+'" class="inp" style="width:42px;text-align:center;padding:5px 6px"/></div>':'';
  var html=bc+'<div style="display:flex;flex-direction:column;gap:14px">';

  html+='<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;text-align:center"><div><div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;color:#fff">'+nL+'</div><div style="color:#6b7a99;font-size:11px;margin-top:2px">LOCAL</div></div><div style="font-family:Oswald,sans-serif;font-size:64px;font-weight:700;color:#00e676;letter-spacing:8px;line-height:1">'+ultimo.goles_local+' - '+ultimo.goles_visitante+'</div><div><div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;color:#fff">'+nV+'</div><div style="color:#6b7a99;font-size:11px;margin-top:2px">VISITANTE</div></div></div>';

  if(goles.length) html+='<div class="card"><p class="section-title">Goles</p>'+golesHtml+'</div>';
  html+='</div>';
  return html;
}

function refrescarMarcador(){
  // Recarga datos y actualiza el marcador SIN reconstruir toda la página
  cargar().then(function(){
    if(VIEW.screen !== 'marcador') return;
    // Reconstruir solo el contenido del marcador
    var app=$('app');
    if(app){ app.innerHTML = buildMarcador(); attachMarcadorEvents(); }
  });
}

function attachMarcadorEvents(){
  var ic=$('cron-iniciar'),pa=$('cron-pausar'),s2=$('cron-sig2'),fi=$('cron-fin'),cr=$('cron-reset'),ex=$('cron-extra');
  if(ic) ic.addEventListener('click',cronIniciar);
  if(pa) pa.addEventListener('click',cronPausar);
  if(s2) s2.addEventListener('click',cronSig2);
  if(fi) fi.addEventListener('click',cronFin);
  if(cr) cr.addEventListener('click',cronReset);
  if(ex) ex.addEventListener('input',function(){CRON.extra=+this.value;});
  var pf=$('btn-pitido-final'); if(pf) pf.addEventListener('click',function(){ playSound('snd-final'); });

  var br=$('btn-marcador-refresh');
  if(br) br.addEventListener('click',function(){
    cargar().then(function(){ if(VIEW.screen==='marcador') render(); });
  });

  // Auto-refresco cada 15 segundos
  clearInterval(marcadorRefreshInterval);
  marcadorRefreshInterval = setInterval(function(){
    if(VIEW.screen==='marcador'){
      cargar().then(function(){ if(VIEW.screen==='marcador') render(); });
    } else {
      clearInterval(marcadorRefreshInterval);
    }
  }, 15000);
}

function buildEquipos() {
  // Solo equipos sin liga ni torneo asignado (libres)
  var libres = DB.equipos.filter(function(e){return !e.liga_id&&!e.torneo_id;});
  var enLiga = DB.equipos.filter(function(e){return !!e.liga_id;});
  var enTorneo = DB.equipos.filter(function(e){return !!e.torneo_id;});

  function listaEqs(eqs,subtitle){
    if(!eqs.length) return '<p style="color:#6b7a99;font-size:13px;padding:6px 0">Ninguno.</p>';
    return eqs.map(function(e,i){
      return '<div class="card-sm" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
        '<span style="font-family:\'Oswald\',sans-serif;font-size:16px;color:#6b7a99;min-width:20px">'+(i+1)+'</span>' +
        '<span style="font-weight:600">'+e.nombre+'</span>' +
        (subtitle?'<span style="color:#6b7a99;font-size:11px">'+subtitle(e)+'</span>':'') +
        '</div>' +
        (!e.liga_id&&!e.torneo_id?'<button class="btn btn-ghost del-eq" data-eid="'+e.id+'" style="padding:4px 8px;font-size:13px">🗑</button>':'') +
        '</div>';
    }).join('');
  }

  return '<div class="flex-col">' +
    '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Equipos</span></div>' +
    '<h2 class="h2">👕 Gestionar equipos</h2>' +
    '<div class="card"><p class="section-title">Añadir equipo</p>' +
    '<div style="display:flex;gap:10px;align-items:flex-end">' +
    '<div style="flex:1"><label class="label">Nombre</label><input type="text" id="eq-nombre" placeholder="Ej: Valencia CF" class="inp"/></div>' +
    '<button class="btn btn-green" id="btn-add-eq">+ Añadir</button></div></div>' +
    '<div class="card"><p class="section-title">Equipos disponibles (sin asignar)</p>'+listaEqs(libres,null)+'</div>' +
    (enLiga.length?'<div class="card"><p class="section-title">Equipos en ligas</p>'+listaEqs(enLiga,function(e){var l=getLiga(e.liga_id);return l?'en '+l.nombre:'';})+'</div>':'') +
    (enTorneo.length?'<div class="card"><p class="section-title">Equipos en torneos</p>'+listaEqs(enTorneo,function(e){var t=getTorneo(e.torneo_id);return t?'en '+t.nombre:'';})+'</div>':'') +
    '</div>';
}

function buildStats() {
  var c = DB.partidos.filter(function(p){return p.completado;});
  var bc = '<div class="breadcrumb"><span class="breadcrumb-link" id="bc-home">Inicio</span><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">Estadisticas</span></div>';
  if(!c.length) return bc + '<div class="card"><p style="color:#6b7a99;text-align:center;padding:40px">Sin datos todavia.</p></div>';

  var gM={}, pM={}, faltaM={}, fuM={}, partM={};
  c.forEach(function(p){
    // Goles
    (p.goles||[]).forEach(function(g){
      if(g.tipo!=='autopista') gM[g.autor] = (gM[g.autor]||0) + 1;
    });
    // Porteros
    if(p.portero_local) pM[p.portero_local] = (pM[p.portero_local]||0) + (p.paradas_local||0);
    if(p.portero_visitante) pM[p.portero_visitante] = (pM[p.portero_visitante]||0) + (p.paradas_visitante||0);
    // Faltas
    (p.faltas||[]).forEach(function(f){ faltaM[f.jugador] = (faltaM[f.jugador]||0) + 1; });
    // Fueras de banda
    if(p.local_id){
      fuM[p.local_id] = (fuM[p.local_id]||0) + (+(p.fueras_local)||0);
      partM[p.local_id] = (partM[p.local_id]||0) + 1;
    }
    if(p.visitante_id){
      fuM[p.visitante_id] = (fuM[p.visitante_id]||0) + (+(p.fueras_visitante)||0);
      partM[p.visitante_id] = (partM[p.visitante_id]||0) + 1;
    }
  });

  var tG = Object.entries(gM).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tP = Object.entries(pM).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tF = Object.entries(faltaM).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tFu = Object.entries(fuM).sort(function(a,b){return b[1]-a[1];});

  function bar(val, mx, color) {
    return '<div style="background:#1a2438;border-radius:4px;height:5px;margin-top:3px">' +
      '<div style="background:'+color+';border-radius:4px;height:5px;width:'+(mx>0?(val/mx*100):0)+'%"></div></div>';
  }

  function rl(data, color, unit) {
    if(!data.length) return '<p style="color:#6b7a99;font-size:13px">Sin datos</p>';
    var mx = data[0][1] || 1;
    return data.map(function(d, i) {
      return '<div style="margin-bottom:8px">' +
        '<div style="display:flex;justify-content:space-between">' +
        '<span style="font-size:13px;font-weight:600">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':'')+' ' + d[0] + '</span>' +
        '<span style="color:'+color+';font-weight:700">' + d[1] + unit + '</span></div>' +
        bar(d[1], mx, color) + '</div>';
    }).join('');
  }

  // Fueras de banda section
  var fuerasSection;
  if(!tFu.length) {
    fuerasSection = '<div class="card"><p class="section-title">Clavados por equipo</p><p style="color:#6b7a99;font-size:13px">Sin datos de fueras registradas.</p></div>';
  } else {
    var mxFu = tFu[0][1] || 1;
    var filas = tFu.map(function(d) {
      var total = d[1];
      var pts = partM[d[0]] || 1;
      var prom = (total / pts).toFixed(1);
      return '<div style="margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:13px;font-weight:600">' + nEq(d[0]) + '</span>' +
        '<div><span style="color:#ff9800;font-weight:700;font-size:14px">' + total + ' total</span>' +
        '<span style="color:#6b7a99;font-size:12px;margin-left:8px">' + prom + '/partido</span></div></div>' +
        bar(total, mxFu, '#ff9800') + '</div>';
    }).join('');
    fuerasSection = '<div class="card"><p class="section-title">Clavados por equipo</p>' + filas + '</div>';
  }

  return bc + '<div class="flex-col">' +
    '<h2 class="h2">Estadisticas</h2>' +
    '<div class="grid2">' +
    '<div class="card"><p class="section-title">Goleadores</p>' + rl(tG,'#00e676',' goles') + '</div>' +
    '<div class="card"><p class="section-title">Porteros</p>' + rl(tP,'#4fc3f7',' paradas') + '</div>' +
    '</div>' +
    '<div class="card"><p class="section-title">Mas faltas</p>' + rl(tF,'#ffea00',' faltas') + '</div>' +
    fuerasSection +

    // Árbitros
    (function(){
      var aM = {};
      c.forEach(function(p){ if(p.arbitro && p.arbitro.trim()) aM[p.arbitro.trim()] = (aM[p.arbitro.trim()]||0) + 1; });
      var tA = Object.entries(aM).sort(function(a,b){return b[1]-a[1];});
      if(!tA.length) return '';
      var mx = tA[0][1]||1;
      return '<div class="card"><p class="section-title">Arbitros (partidos pitados)</p>' +
        tA.map(function(d,i){
          return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between">' +
            '<span style="font-size:13px;font-weight:600">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':'') + ' ' + d[0] + '</span>' +
            '<span style="color:#ce93d8;font-weight:700">' + d[1] + ' partidos</span></div>' +
            '<div style="background:#1a2438;border-radius:4px;height:5px;margin-top:3px">' +
            '<div style="background:#ce93d8;border-radius:4px;height:5px;width:'+(d[1]/mx*100)+'%"></div></div></div>';
        }).join('') + '</div>';
    })() +

    // Más expulsados
    (function(){
      var xM = {};
      c.forEach(function(p){ (p.expulsiones||[]).forEach(function(x){ xM[x.jugador] = (xM[x.jugador]||0) + 1; }); });
      var tX = Object.entries(xM).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
      if(!tX.length) return '';
      var mx = tX[0][1]||1;
      return '<div class="card"><p class="section-title">Mas expulsados</p>' +
        tX.map(function(d,i){
          return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between">' +
            '<span style="font-size:13px;font-weight:600">' + (i===0?'🥇':i===1?'🥈':i===2?'🥉':'') + ' ' + d[0] + '</span>' +
            '<span style="color:#ff3d57;font-weight:700">' + d[1] + ' exp.</span></div>' +
            '<div style="background:#1a2438;border-radius:4px;height:5px;margin-top:3px">' +
            '<div style="background:#ff3d57;border-radius:4px;height:5px;width:'+(d[1]/mx*100)+'%"></div></div></div>';
        }).join('') + '</div>';
    })() +

    '<div class="card"><p class="section-title">Resumen de la temporada</p>' +
    '<div class="grid2">' +
    [['Partidos',c.length],
     ['Goles',c.reduce(function(s,p){return s+(p.goles_local||0)+(p.goles_visitante||0);},0)],
     ['Faltas',c.reduce(function(s,p){return s+(p.faltas||[]).length;},0)],
     ['Expulsiones',c.reduce(function(s,p){return s+(p.expulsiones||[]).length;},0)]
    ].map(function(r){
      return '<div class="card-sm" style="text-align:center">' +
        '<div style="font-family:Oswald,sans-serif;font-size:26px;font-weight:700;color:#00e676;margin-top:4px">' + r[1] + '</div>' +
        '<div style="color:#6b7a99;font-size:12px;margin-top:3px">' + r[0] + '</div></div>';
    }).join('') +
    '</div></div>' +
    '</div>';
}

function attachEvents() {
  // Breadcrumbs
  var bcHome=$('bc-home'), bcLiga=$('bc-liga'), bcTorneo=$('bc-torneo');
  if(bcHome) bcHome.addEventListener('click',function(){salvarWipActual();clearInterval(marcadorRefreshInterval);VIEW={screen:'home',ligaId:null,torneoId:null};render();});
  if(bcLiga) bcLiga.addEventListener('click',function(){salvarWipActual();VIEW.screen='liga';render();});
  if(bcTorneo) bcTorneo.addEventListener('click',function(){salvarWipActual();VIEW.screen='torneo';render();});

  // Modal close
  var ov=$('modal-overlay'), cl=$('btn-modal-close');
  if(ov) ov.addEventListener('click',function(e){if(e.target===ov){MODAL={type:null,data:null,editando:false};render();}});
  if(cl) cl.addEventListener('click',function(){MODAL={type:null,data:null,editando:false};render();});

  // HOME events
  if(VIEW.screen==='home') attachHomeEvents();
  else if(VIEW.screen==='liga') attachLigaEvents();
  else if(VIEW.screen==='torneo') attachTorneoEvents();
  else if(VIEW.screen==='acta') attachActaEvents();
  else if(VIEW.screen==='marcador') attachMarcadorEvents();
  else if(VIEW.screen==='equipos') attachEquiposEvents();

  // Modal events
  if(MODAL.type==='partido') attachModalPartidoEvents();
  if(MODAL.type==='nueva-liga') attachModalNuevaLigaEvents();
  if(MODAL.type==='nuevo-torneo') attachModalNuevoTorneoEvents();
}

function attachHomeEvents(){
  var bnl=$('btn-nueva-liga'), bnt=$('btn-nuevo-torneo'), bas=$('btn-acta-suelta');
  var beq=$('btn-equipos'), bst=$('btn-stats-global');
  if(bnl) bnl.addEventListener('click',function(){MODAL={type:'nueva-liga',data:{},editando:false};render();});
  if(bnt) bnt.addEventListener('click',function(){MODAL={type:'nuevo-torneo',data:{},editando:false};render();});
  if(bas) bas.addEventListener('click',function(){WIP=newWip();saveWip(WIP);VIEW.screen='acta';render();});
  var bmc=$('btn-marcador');
  if(bmc) bmc.addEventListener('click',function(){VIEW.screen='marcador';render();});
  if(beq) beq.addEventListener('click',function(){VIEW.screen='equipos';render();});
  if(bst) bst.addEventListener('click',function(){VIEW.screen='stats';render();});
  // Abrir liga
  document.querySelectorAll('[data-liga]').forEach(function(el){
    el.addEventListener('click',function(){VIEW={screen:'liga',ligaId:this.dataset.liga,torneoId:null};render();});
  });
  // Abrir torneo
  document.querySelectorAll('[data-torneo]').forEach(function(el){
    el.addEventListener('click',function(){VIEW={screen:'torneo',torneoId:this.dataset.torneo,ligaId:null};render();});
  });
  // Acta suelta
  document.querySelectorAll('[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=DB.partidos.find(function(x){return x.id===el.dataset.pid;});
      if(p){MODAL={type:'partido',data:clone(p),editando:false};render();}
    });
  });
}

function attachLigaEvents(){
  var bel=$('btn-eliminar-liga');
  if(bel) bel.addEventListener('click',function(){
    if(!window.confirm('Eliminar esta liga y todos sus partidos?')) return;
    eliminarLiga(VIEW.ligaId);
  });
  // Partidos del calendario
  document.querySelectorAll('[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=DB.partidos.find(function(x){return x.id===el.dataset.pid;});
      if(!p) return;
      if(!p.completado) {
        // Ir a rellenar el acta
        WIP=newWip();
        WIP.localId=p.local_id; WIP.visitanteId=p.visitante_id;
        WIP.ligaId=p.liga_id; WIP.torneoId=p.torneo_id;
        WIP.jornadaId=p.jornada_id; WIP.partidoId=p.id;
        var j=DB.jornadas.find(function(x){return x.id===p.jornada_id;});
        if(j){ WIP.jornada=j.numero; }
        saveWip(WIP);
        VIEW.screen='acta'; render();
      } else {
        MODAL={type:'partido',data:clone(p),editando:false};render();
      }
    });
  });
}

function attachTorneoEvents(){
  var bet=$('btn-eliminar-torneo');
  if(bet) bet.addEventListener('click',function(){
    if(!window.confirm('Eliminar este torneo?')) return;
    eliminarTorneo(VIEW.torneoId);

  document.querySelectorAll('[data-pid]').forEach(function(el){
    el.addEventListener('click',function(){
      var p=DB.partidos.find(function(x){return x.id===el.dataset.pid;});
      if(!p) return;
      if(!p.completado){
        WIP=newWip();
        WIP.localId=p.local_id; WIP.visitanteId=p.visitante_id;
        WIP.torneoId=p.torneo_id; WIP.ligaId=p.liga_id;
        WIP.jornadaId=p.jornada_id; WIP.partidoId=p.id;
        var j=DB.jornadas.find(function(x){return x.id===p.jornada_id;});
        if(j){ WIP.jornada=j.numero; }
        saveWip(WIP);
        VIEW.screen='acta'; render();
      } else {
        MODAL={type:'partido',data:clone(p),editando:false};render();
      }
    });
  });
}

function attachEquiposEvents(){
  var add=$('btn-add-eq');
  if(add) add.addEventListener('click',function(){
    var n=($('eq-nombre').value||'').trim();
    if(!n) return;
    if(DB.equipos.find(function(e){return e.nombre.toLowerCase()===n.toLowerCase()&&!e.liga_id&&!e.torneo_id;})){alert('Ya existe.');return;}
    add.disabled=true;
    db.from('jugadores').insert({id:uid(),nombre:n}).then(function(res){
      if(res.error){alert('Error: '+res.error.message);add.disabled=false;return;}
      cargar().then(render);
    });
  });
  document.querySelectorAll('.del-eq').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(!window.confirm('Eliminar equipo?')) return;
      db.from('jugadores').delete().eq('id',this.dataset.eid).then(function(){ cargar().then(render); });
    });
  });
}

// ── SONIDOS ───────────────────────────────────────────────────────
var cronPartidoIniciado = false;

function playSound(id) {
  var el = document.getElementById(id);
  if(!el) return;
  try { el.currentTime = 0; el.play().catch(function(){}); } catch(e) {}
}

function cargarAudios(gol, inicio, final_) {
  var g = document.getElementById('snd-gol');
  var i = document.getElementById('snd-inicio');
  var f = document.getElementById('snd-final');
  if(g) g.src = gol;
  if(i) i.src = inicio;
  if(f) f.src = final_;
}

// ── INIT ──────────────────────────────────────────────────────────
if(CONFIGURED){
  cargar().then(render);
  // Realtime
  db.channel('lb')
    .on('postgres_changes',{event:'*',schema:'public',table:'jugadores'},function(){if(VIEW.screen!=='acta'){cargar().then(render);}})
    .on('postgres_changes',{event:'*',schema:'public',table:'ligas'},function(){if(VIEW.screen!=='acta'){cargar().then(render);}})
    .on('postgres_changes',{event:'*',schema:'public',table:'torneos'},function(){if(VIEW.screen!=='acta'){cargar().then(render);}})
    .on('postgres_changes',{event:'*',schema:'public',table:'partidos'},function(){
      if(VIEW.screen==='marcador'){cargar().then(function(){if(VIEW.screen==='marcador')render();});}
      else if(VIEW.screen!=='acta'){cargar().then(render);}
    })
    .subscribe();
} else {
  render();
}
</script>
